<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS AI v21.2 - GEMINI 3.1 COPILOT</title>
    <style>
        body { margin: 0; background-color: #0B0E14; color: #E6EDF3; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; }
        .header { background-color: #161B22; padding: 15px; text-align: center; border-bottom: 2px solid #B388FF; }
        .header h2 { margin: 0; color: #B388FF; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }
        .content { padding: 15px; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        label { font-size: 11px; color: #8B949E; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        input, select, textarea { width: 100%; padding: 12px; background-color: #0B0E14; border: 1px solid #30363D; color: #00E5FF; border-radius: 6px; outline: none; font-size: 13px; box-sizing: border-box; transition: border-color 0.2s; }
        input:focus, textarea:focus { border-color: #B388FF; }
        textarea { height: 100px; font-family: monospace; resize: vertical; }
        button { background-color: #B388FF; color: #0B0E14; border: none; padding: 14px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        button:hover { background-color: #9575CD; transform: translateY(-1px); }
        button:active { transform: translateY(1px); }
        .btn-inject { background-color: #00E676; margin-top: 5px;}
        .btn-inject:hover { background-color: #00C853; }
        #loader { display: none; text-align: center; color: #B388FF; font-size: 12px; font-style: italic; margin-top: 5px; }
        
        .toggle-container { display: flex; align-items: center; gap: 10px; background: #161B22; padding: 10px; border-radius: 6px; border: 1px solid #30363D; }
        .toggle-container input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #B388FF; }
        .toggle-label { font-size: 12px; color: #E6EDF3; font-weight: normal; text-transform: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h2>🤖 Nexus AI Copilot (Gemini 3.1)</h2>
</div>

<div class="content">
    <div>
        <label>API Key (Google Gemini):</label>
        <input type="password" id="apiKey" placeholder="AIzaSy..." value="">
    </div>
    
    <div class="toggle-container">
        <input type="checkbox" id="useMemory" checked>
        <label for="useMemory" class="toggle-label">🧠 <b>Modo Iterativo:</b> Leer y modificar la pieza actual del visor (Memoria de Contexto).</label>
    </div>

    <div>
        <label>Instrucción para la IA:</label>
        <textarea id="promptInput" placeholder="Ej: Haz un cubo... o si ya hay uno: Hazle un agujero cilíndrico en el centro."></textarea>
    </div>

    <button onclick="generateCode()">⚡ Generar / Modificar Código</button>
    <div id="loader">Analizando geometría y conectando con Gemini 3.1...</div>

    <div>
        <label>Código JS-CSG Generado (Editable):</label>
        <textarea id="codeOutput" style="height: 180px; color: #00E676;"></textarea>
    </div>

    <button class="btn-inject" id="btnInject" onclick="inject()">⚙️ Inyectar al Motor 3D</button>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const savedKey = localStorage.getItem('nexus_gemini_key');
        if(savedKey) document.getElementById('apiKey').value = savedKey;
    });

    // Función para obtener el código actual del backend (Memoria de estado)
    async function getCurrentCode() {
        try {
            const res = await fetch('/api/get_code_b64.json');
            const data = await res.json();
            if(data && data.code_b64) return atob(data.code_b64);
        } catch(e) {
            console.warn("No se pudo leer el código actual del servidor.");
        }
        return "";
    }

    async function generateCode() {
        const key = document.getElementById('apiKey').value.trim();
        const prompt = document.getElementById('promptInput').value.trim();
        const useMemory = document.getElementById('useMemory').checked;
        
        if(!key || !prompt) { alert("⚠️ Faltan datos."); return; }
        
        localStorage.setItem('nexus_gemini_key', key);
        document.getElementById('loader').style.display = 'block';
        document.getElementById('codeOutput').value = "";

        // Base del System Prompt
        let systemInstruction = `Eres NEXUS TITAN AI, un experto en geometría 3D usando CSG.js.
Tu ÚNICO objetivo es devolver código JavaScript puro, sin markdown y sin explicaciones.
El código DEBE contener una función global 'main()' que retorne un objeto CSG válido.
Primitivas: CSG.cube(), CSG.cylinder(), CSG.sphere().
Función especial inyectada: roundedBox(width, depth, height, radius).
Operaciones booleanas soportan arrays: obj.subtract([o1, o2]).`;

        let finalPrompt = prompt;

        // Inyectar el código actual en el prompt si el modo iterativo está activado
        if (useMemory) {
            let currentCode = await getCurrentCode();
            if (currentCode && currentCode.trim() !== "") {
                systemInstruction += `\n\nATENCIÓN: Se te proporcionará el código actual de la pieza. DEBES mantener la estructura de la pieza actual y añadir las modificaciones o sustracciones que pida el usuario. NO reescribas la pieza entera desde cero si puedes aprovechar las variables existentes.`;
                
                finalPrompt = `--- CÓDIGO ACTUAL ---\n${currentCode}\n---------------------\n\nINSTRUCCIÓN DEL USUARIO: Modifica este código actual para cumplir la siguiente petición: "${prompt}". Devuelve TODO el código completo actualizado con la función main()`;
            } else {
                finalPrompt = `Genera el código para: ${prompt}`;
            }
        } else {
            finalPrompt = `Genera desde cero el código para: ${prompt}`;
        }

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${key}`, {
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    contents: [{ parts: [{ text: systemInstruction + "\n\n" + finalPrompt }] }] 
                })
            });
            
            const data = await res.json();
            if(!res.ok) throw new Error(data.error?.message || "Error en la API de Google.");
            
            let text = data.candidates[0].content.parts[0].text;
            text = text.replace(/```javascript/gi, "").replace(/```js/gi, "").replace(/```/g, "").trim();
            
            document.getElementById('codeOutput').value = text;
        } catch(e) { 
            console.error(e);
            document.getElementById('codeOutput').value = "// ERROR DETALLADO:\n// " + e.message;
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    async function inject() {
        const code = document.getElementById('codeOutput').value.trim();
        const btn = document.getElementById('btnInject');
        
        if(!code) return;
        
        const originalText = btn.innerHTML;
        btn.innerHTML = "⏳ Inyectando...";
        
        try {
            const response = await fetch('/api/inject_code', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ code }) 
            });
            
            if(response.ok) {
                btn.innerHTML = "✅ INYECTADO";
                btn.style.backgroundColor = "#2E7D32";
            } else throw new Error("Rechazado por backend.");
        } catch (error) {
            alert("Error: " + error.message);
            btn.innerHTML = "❌ ERROR";
            btn.style.backgroundColor = "#D50000";
        } finally {
            setTimeout(() => { btn.innerHTML = originalText; btn.style.backgroundColor = ""; }, 2500);
        }
    }
</script>
</body>
</html>
