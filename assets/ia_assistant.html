<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS AI v23.12 - VISION TO PRINT CORE (BAMBU GUARDRAIL)</title>
    <style>
        body { margin: 0; background-color: #0B0E14; color: #E6EDF3; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; }
        .header { background-color: #161B22; padding: 15px; text-align: center; border-bottom: 2px solid #FFAB00; }
        .header h2 { margin: 0; color: #FFAB00; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }
        .content { padding: 15px; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        label { font-size: 11px; color: #8B949E; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; display: block; }
        input, select, textarea { width: 100%; padding: 12px; background-color: #0B0E14; border: 1px solid #30363D; color: #00E5FF; border-radius: 6px; outline: none; font-size: 13px; box-sizing: border-box; transition: border-color 0.2s; }
        input:focus, textarea:focus, select:focus { border-color: #FFAB00; }
        textarea { height: 90px; font-family: monospace; resize: vertical; }
        button { background-color: #FFAB00; color: #0B0E14; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        button:hover { background-color: #FFC400; transform: translateY(-1px); }
        button:active { transform: translateY(1px); }
        
        .btn-inject { background-color: #B388FF; margin-top: 5px;}
        .btn-inject:hover { background-color: #9575CD; }
        .btn-camera { background-color: #00B0FF; color: #000; margin-bottom: 5px;}
        
        .macro-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-macro { background-color: #161B22; color: #00E676; border: 1px solid #00E676; padding: 10px; font-size: 11px; }
        .btn-macro:hover { background-color: #00E676; color: #000; }
        
        .btn-reverse { background-color: #D50000; color: #FFF; border: 1px solid #FF5252; grid-column: span 2; font-weight: 900; }
        .btn-reverse:hover { background-color: #FF5252; color: #000; box-shadow: 0 0 10px #FF5252; }

        #loader { display: none; text-align: center; color: #FFAB00; font-size: 12px; font-style: italic; margin-top: 5px; }
        
        .toggle-container { display: flex; align-items: center; gap: 10px; background: #161B22; padding: 10px; border-radius: 6px; border: 1px solid #30363D; }
        .toggle-container input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #FFAB00; }
        .toggle-label { font-size: 12px; color: #E6EDF3; cursor: pointer; }
        
        .preview-container { position: relative; display: none; width: fit-content; margin-top: 5px; }
        #imagePreview { max-height: 150px; border-radius: 6px; border: 2px solid #00B0FF; }
        .btn-remove-img { position: absolute; top: -5px; right: -5px; background: #D50000; color: white; border: none; border-radius: 50%; width: 24px; height: 24px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; box-shadow: 0 2px 5px rgba(0,0,0,0.5);}
    </style>
</head>
<body>

<div class="header">
    <h2>🤖 Nexus AI Core (v23.12 - BAMBU GUARDRAIL)</h2>
</div>

<div class="content">
    <div>
        <label>API Key (Google Gemini):</label>
        <input type="password" id="apiKey" placeholder="AIzaSy..." value="">
    </div>

    <div>
        <label>Motor IA (Elige de la lista o escribe a mano):</label>
        <input type="text" id="modelSelector" list="modelList" value="gemini-3-flash-preview">
        <datalist id="modelList">
            <option value="gemini-3-flash-preview">
            <option value="gemini-3.1-flash-lite-preview">
            <option value="gemini-2.5-flash">
        </datalist>
    </div>
    
    <div class="toggle-container">
        <label style="color:#FFAB00; font-size: 11px; font-weight: bold; margin:0;">⚡ MODO:</label>
        <select id="aiMode" style="flex-grow: 1; padding: 8px; background: #0B0E14; border: 1px solid #30363D; color: #00E5FF; border-radius: 4px;">
            <option value="copilot">🛠️ Copiloto Libre (Programar JS-CSG)</option>
            <option value="agentic">🎛️ Agentic UI (Mover Sliders App)</option>
        </select>
    </div>
    
    <div class="toggle-container" id="memoryContainer">
        <input type="checkbox" id="useMemory" checked>
        <label for="useMemory" class="toggle-label">🧠 <b>Modo Iterativo:</b> Leer y modificar la pieza actual.</label>
    </div>

    <div>
        <label>Nexus Copilot Macros (Fase 13):</label>
        <div class="macro-grid">
            <button class="btn-macro" onclick="applyGenerativeMacro('lattice')">🧬 Generative Lattice</button>
            <button class="btn-macro" onclick="applyGenerativeMacro('shell')">🔲 Shell / Vaciado</button>
            <button class="btn-macro btn-reverse" onclick="applyGenerativeMacro('reverse')">🔄 Vision-to-Print: Clonar Pieza (Pide Foto + B.Box)</button>
        </div>
    </div>

    <div>
        <label>Visión Artificial (Planos / Pieza Rota):</label>
        <input type="file" id="imageInput" accept="image/*" style="display: none;">
        <button class="btn-camera" onclick="document.getElementById('imageInput').click()">📷 Adjuntar Foto Local</button>
        
        <div class="preview-container" id="previewContainer">
            <img id="imagePreview" src="">
            <button class="btn-remove-img" onclick="removeImage()">✖</button>
        </div>
    </div>

    <div>
        <label>Instrucción / Animación / Errores:</label>
        <textarea id="promptInput" placeholder="Ej: Clona esta pieza asegurando bases planas y tolerancias +0.2mm para impresión FDM..."></textarea>
    </div>

    <button onclick="generateCode()" id="btnGenerate">⚡ Analizar / Programar Pieza</button>
    <div id="loader">Analizando geometría visual y calculando booleanas...</div>

    <div>
        <label>Respuesta / Código JS (Editable):</label>
        <textarea id="codeOutput" style="height: 160px; color: #FFAB00;"></textarea>
    </div>

    <button class="btn-inject" id="btnInject" onclick="inject()">⚙️ Inyectar al Visor 3D</button>
</div>

<script>
    let currentB64 = null;
    let currentMimeType = null;
    let lastErrorProcessed = ""; // Para evitar bucles infinitos de la IA

    async function checkDataBridge() {
        try {
            const res = await fetch('/api/get_vision.json');
            const data = await res.json();
            
            if (data.image_b64 && data.image_b64.trim() !== "") {
                document.getElementById('imagePreview').src = data.image_b64;
                document.getElementById('previewContainer').style.display = 'block';
                currentB64 = data.image_b64.split(',')[1];
                currentMimeType = data.image_b64.split(';')[0].split(':')[1] || "image/jpeg";
            }
            
            // 🔥 FASE 14: Gestión Inteligente de Errores y Límites Físicos
            if (data.last_error && data.last_error.trim() !== "" && data.last_error !== lastErrorProcessed) {
                lastErrorProcessed = data.last_error;
                const promptBox = document.getElementById('promptInput');
                let autoTrigger = false;

                if (data.last_error.includes("GUARDRAIL_180")) {
                    promptBox.value = "⚠️ ALERTA FÍSICA (BAMBU LAB A1 MINI):\n" + data.last_error + "\n\nTu tarea: Añade una operación '.scale(factor)' a la pieza final antes del 'return' para reducirla proporcionalmente y que encaje sobradamente dentro de los 170mm.";
                    autoTrigger = true; // La IA se autocorregirá sola
                } 
                else if(data.last_error.includes("flip")) {
                    promptBox.value = "CRÍTICO: Has causado un error 'flip' en el motor BSP de CSG.js. Evita esto:\n1. NO pases Arrays a booleanas (usa a.subtract(b).subtract(c)).\n2. Z-Fighting: Haz que los cilindros de resta sean MUCHO MÁS LARGOS que la pieza principal para que la atraviesen limpiamente.\nReescribe el código reparando esto.";
                } 
                else {
                    promptBox.value = "He recibido este error en el visor 3D al compilar mi código JS-CSG:\n\n" + data.last_error + "\n\nPor favor, genérame el código corregido respetando csg.js.";
                }
                
                document.getElementById('aiMode').value = "copilot";
                document.getElementById('memoryContainer').style.display = 'flex';
                document.getElementById('useMemory').checked = true;

                // Si saltó el Guardrail, simulamos un clic en 1.5 segundos para que lo veas pasar
                if(autoTrigger) {
                    const btn = document.getElementById('btnGenerate');
                    btn.innerHTML = "⚠️ Auto-Corrigiendo Escala...";
                    btn.style.backgroundColor = "#D50000";
                    setTimeout(() => {
                        btn.innerHTML = "⚡ Analizar / Programar Pieza";
                        btn.style.backgroundColor = "#FFAB00";
                        generateCode();
                    }, 1500);
                }
            }
        } catch(e) {}
    }

    document.addEventListener('DOMContentLoaded', () => {
        const savedKey = localStorage.getItem('nexus_gemini_key');
        if(savedKey) document.getElementById('apiKey').value = savedKey;
        
        document.getElementById('aiMode').addEventListener('change', (e) => {
            document.getElementById('memoryContainer').style.display = e.target.value === 'agentic' ? 'none' : 'flex';
        });

        checkDataBridge();
        setInterval(checkDataBridge, 1000); // Poll más agresivo para capturar el Guardrail rápido
    });

    document.getElementById('imageInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(!file) return;
        currentMimeType = file.type;
        const reader = new FileReader();
        reader.onload = function(event) {
            document.getElementById('imagePreview').src = event.target.result;
            document.getElementById('previewContainer').style.display = 'block';
            currentB64 = event.target.result.split(',')[1];
        };
        reader.readAsDataURL(file);
    });

    function removeImage() {
        currentB64 = null; currentMimeType = null;
        document.getElementById('imageInput').value = "";
        document.getElementById('previewContainer').style.display = 'none';
    }

    async function getCurrentCode() {
        try {
            const res = await fetch('/api/get_code_b64.json');
            const data = await res.json();
            if(data && data.code_b64) return atob(data.code_b64);
        } catch(e) { return ""; }
        return "";
    }

    function applyGenerativeMacro(type) {
        document.getElementById('aiMode').value = 'copilot';
        const promptBox = document.getElementById('promptInput');
        
        if (type === 'reverse') {
            document.getElementById('useMemory').checked = false; 
            const copilotData = JSON.parse(localStorage.getItem('nexus_copilot_data') || "null");
            
            if(!currentB64) {
                alert("📷 ¡OJO! Sube primero una foto de la pieza física que quieres clonar usando el botón de 'Adjuntar Foto Local'.");
                return;
            }

            if(copilotData) {
                promptBox.value = `¡ALERTA DE INGENIERÍA INVERSA TEXT-TO-PRINT!\nHe adjuntado una foto de la pieza que quiero clonar. Además, en el visor 3D tengo una referencia de escala de la que he sacado el Bounding Box exacto:\n- Ancho (X): ${copilotData.x} mm\n- Largo (Y): ${copilotData.y} mm\n- Alto (Z): ${copilotData.z} mm\n\nTu tarea:\n1. Analiza visualmente la foto.\n2. Reconstruye la pieza en código JavaScript CSG limpio (retornando la función main).\n3. Usa las dimensiones del Bounding Box como LÍMITE GENERAL para tus primitivas.\n4. IMPORTANTE PARA IMPRESIÓN FDM: Añade +0.2mm a todos los cilindros que restes (agujeros) para asegurar tolerancias. Asegúrate de que la cara más plana repose sobre Z=0.`;
            } else {
                promptBox.value = `¡ALERTA DE INGENIERÍA INVERSA!\nAnaliza la pieza de la foto adjunta. Reconstruye su geometría en código CSG paramétrico puro (JavaScript, retornando main). Asume medidas proporcionales a una caja de 50x50x50mm. Añade tolerancias de impresión 3D (+0.2mm en agujeros) y usa bases planas.`;
            }
        } else if (type === 'lattice') {
            document.getElementById('useMemory').checked = true;
            promptBox.value = "Aplica Optimización Topológica (Generative Design) a esta pieza. Crea una red de vaciados usando CILINDROS (para que la Bambu Lab los imprima mejor) usando bucles matemáticos (for) y CSG.subtract(). El objetivo es comerse el interior de la pieza para ahorrar material, dejando las paredes exteriores y estructurales intactas.";
        } else if (type === 'shell') {
            document.getElementById('useMemory').checked = true;
            promptBox.value = "Aplica un vaciado (Shell) a esta pieza. Réstale una versión de sí misma ligeramente más pequeña para que quede hueca por dentro, pero con un grosor de pared de unos 2.4mm (múltiplo exacto para extrusor 0.4mm).";
        }
        
        if (type !== 'reverse') generateCode();
    }

    async function generateCode() {
        const key = document.getElementById('apiKey').value.trim();
        const prompt = document.getElementById('promptInput').value.trim();
        const aiMode = document.getElementById('aiMode').value;
        const useMemory = document.getElementById('useMemory').checked;
        const selectedModel = document.getElementById('modelSelector').value.trim(); 
        
        if(!key || (!prompt && !currentB64)) { alert("⚠️ Faltan datos."); return; }
        if(!selectedModel) { alert("⚠️ Especifica un modelo IA."); return; }
        
        localStorage.setItem('nexus_gemini_key', key);
        document.getElementById('loader').style.display = 'block';
        document.getElementById('loader').innerText = `Procesando con ${selectedModel}...`;
        document.getElementById('codeOutput').value = "";

        let systemInstruction = "";
        let finalPrompt = prompt;

        if (aiMode === "agentic") {
            systemInstruction = `Eres el Agente UI de NEXUS CAD. Tu objetivo es controlar la interfaz visual de la app devolviendo ÚNICAMENTE un JSON válido.`;
            finalPrompt = `Instrucción: ${prompt}`;
        } 
        else {
            systemInstruction = `Eres NEXUS TITAN AI, experto en Diseño Paramétrico 3D usando la librería 'csg.js' nativa de JavaScript.
Tu ÚNICO objetivo es devolver código JavaScript puro. NUNCA uses markdown ni \`\`\`javascript.
El código DEBE contener una función global 'main(params)' que retorne un ÚNICO objeto CSG final.

⛔ REGLAS VITALES MATEMÁTICAS (ANTI-FLIP BSP ERROR):
1. NO PASES ARRAYS a booleanas. NUNCA HAGAS a.subtract([b,c]). DEBES encadenar: a.subtract(b).subtract(c).
2. CARAS COPLANARES: Cualquier objeto de resta (subtract) debe ser EXAGERADAMENTE MÁS LARGO que la pieza a cortar.

REGLAS DE RECONSTRUCCIÓN FDM:
- Usa altas resoluciones para cilindros: {slices: 128}.
- Agujeros (subtract): Aumenta su radio en +0.2mm para compensar la expansión térmica del FDM.
- Tolerancias: El lado más plano debe estar en Z=0.`;

            if (useMemory) {
                let currentCode = await getCurrentCode();
                if (currentCode && currentCode.trim() !== "") {
                    systemInstruction += `\n\nATENCIÓN: Mantén la estructura base actual intacta. Modifícalo según se pida, respetando SIEMPRE las reglas ANTI-FLIP.`;
                    finalPrompt = `--- CÓDIGO ACTUAL ---\n${currentCode}\n---------------------\n\nINSTRUCCIÓN: Modifica este código para cumplir: "${prompt}".`;
                }
            }
        }

        let payloadParts = [{ text: systemInstruction + "\n\n" + finalPrompt }];
        if (currentB64) payloadParts.push({ inlineData: { mimeType: currentMimeType, data: currentB64 } });

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${key}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts: payloadParts }] })
            });
            const data = await res.json();
            if(!res.ok) throw new Error(data.error?.message);
            
            let text = data.candidates[0].content.parts[0].text.trim();
            
            if (aiMode === "agentic") {
                text = text.replace(/```json/gi, "").replace(/```/g, "").trim();
                let jsonPayload = JSON.parse(text);
                document.getElementById('codeOutput').value = "JSON INTERCEPTADO:\n" + JSON.stringify(jsonPayload, null, 2);
            } else {
                text = text.replace(/```javascript/gi, "").replace(/```js/gi, "").replace(/```/g, "").trim();
                document.getElementById('codeOutput').value = text;
            }
        } catch(e) { 
            document.getElementById('codeOutput').value = "// ERROR:\n" + e.message;
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    async function inject() {
        if(document.getElementById('aiMode').value === "agentic") return;
        const code = document.getElementById('codeOutput').value.trim();
        if(!code) return;
        const btn = document.getElementById('btnInject');
        const originalText = btn.innerHTML; btn.innerHTML = "⏳ Inyectando y Validando Escala...";
        
        // 🔥 FASE 14: SECUESTRO DE LA FUNCIÓN MAIN() PARA EL GUARDRAIL FÍSICO
        const safeCode = code + `
\n// 🛡️ NEXUS GUARDRAIL INYECTADO (BAMBU LAB A1 MINI)
if (typeof main === 'function') {
    const _originalMain = main;
    main = function(params) {
        let _obj = _originalMain(params);
        if (_obj && typeof _obj.getBounds === 'function') {
            let _b = _obj.getBounds();
            let _maxX = _b[1].x - _b[0].x;
            let _maxY = _b[1].y - _b[0].y;
            let _maxZ = _b[1].z - _b[0].z;
            let _maxDim = Math.max(_maxX, _maxY, _maxZ);
            
            if (_maxDim > 180) {
                throw new Error("GUARDRAIL_180: La pieza mide " + _maxDim.toFixed(1) + "mm. Supera el volumen de la Bambu Lab A1 Mini (180x180x180mm).");
            }
        }
        return _obj;
    };
}
`;

        try {
            const response = await fetch('/api/inject_code', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ code: safeCode }) });
            if(response.ok) { btn.innerHTML = "✅ INYECTADO (TAMAÑO OK)"; btn.style.backgroundColor = "#00E676"; btn.style.color = "#000"; } 
            else throw new Error("Rechazado por backend.");
        } catch (error) {
            alert("Error de Red: " + error.message); btn.innerHTML = "❌ ERROR DE RED"; btn.style.backgroundColor = "#D50000";
        } finally {
            setTimeout(() => { btn.innerHTML = originalText; btn.style.backgroundColor = "#B388FF"; btn.style.color = "#FFF"; }, 2500);
            removeImage();
            lastErrorProcessed = ""; // Reseteamos el gestor de errores para el siguiente inject
        }
    }
</script>
</body>
</html>
