<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS AI v21.2 - TITAN ENGINE</title>
    <style>
        body { margin: 0; background-color: #0B0E14; color: #E6EDF3; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; }
        .header { background-color: #161B22; padding: 15px; text-align: center; border-bottom: 2px solid #B388FF; }
        .header h2 { margin: 0; color: #B388FF; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }
        .content { padding: 15px; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        label { font-size: 11px; color: #8B949E; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        input, select, textarea { width: 100%; padding: 12px; background-color: #0B0E14; border: 1px solid #30363D; color: #00E5FF; border-radius: 6px; outline: none; font-size: 13px; box-sizing: border-box; transition: border-color 0.2s; }
        input:focus, textarea:focus { border-color: #B388FF; }
        textarea { height: 100px; font-family: monospace; resize: vertical; }
        button { background-color: #B388FF; color: #0B0E14; border: none; padding: 14px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }
        button:hover { background-color: #9575CD; transform: translateY(-1px); }
        button:active { transform: translateY(1px); }
        .btn-inject { background-color: #00E676; margin-top: 5px;}
        .btn-inject:hover { background-color: #00C853; }
        #loader { display: none; text-align: center; color: #B388FF; font-size: 12px; font-style: italic; margin-top: 5px; }
    </style>
</head>
<body>

<div class="header">
    <h2>🤖 Nexus Titan AI</h2>
</div>

<div class="content">
    <div>
        <label>API Key (Google Gemini):</label>
        <input type="password" id="apiKey" placeholder="AIzaSy..." value="">
    </div>
    
    <div>
        <label>Instrucción para la IA:</label>
        <textarea id="promptInput" placeholder="Ej: Crea una caja hueca de 20x20x10 con paredes de 2mm de grosor..."></textarea>
    </div>

    <button onclick="generateCode()">⚡ Generar Código CSG</button>
    <div id="loader">Ensamblando geometría neuronal... Por favor espera.</div>

    <div>
        <label>Código JS-CSG Generado (Editable):</label>
        <textarea id="codeOutput" style="height: 180px; color: #00E676;"></textarea>
    </div>

    <button class="btn-inject" id="btnInject" onclick="inject()">⚙️ Inyectar al Motor 3D</button>
</div>

<script>
    // Recuperar API Key guardada automáticamente al iniciar
    document.addEventListener('DOMContentLoaded', () => {
        const savedKey = localStorage.getItem('nexus_gemini_key');
        if(savedKey) document.getElementById('apiKey').value = savedKey;
    });

    async function generateCode() {
        const key = document.getElementById('apiKey').value.trim();
        const prompt = document.getElementById('promptInput').value.trim();
        
        if(!key || !prompt) { 
            alert("⚠️ Faltan datos: Asegúrate de ingresar tu API Key y una instrucción."); 
            return; 
        }
        
        // Guardar la key en el dispositivo para futuras sesiones
        localStorage.setItem('nexus_gemini_key', key);
        
        document.getElementById('loader').style.display = 'block';
        document.getElementById('codeOutput').value = "";

        // --- EL CEREBRO DE LA OPERACIÓN: SYSTEM PROMPT ---
        const systemInstruction = `Eres NEXUS TITAN AI, un desarrollador experto en geometría paramétrica 3D usando la librería JavaScript CSG.js (Constructive Solid Geometry).
Tu ÚNICO objetivo es devolver código JavaScript puro. NO uses bloques de markdown (\`\`\`javascript). NO des explicaciones.
El código debe contener una única función global llamada 'main()' que retorne un objeto CSG válido.
Las primitivas disponibles son:
- CSG.cube({center: [x,y,z], radius: [x,y,z]}) o {radius: [x,y,z]} asumiendo centro en origen.
- CSG.cylinder({start: [x,y,z], end: [x,y,z], radius: r})
- CSG.sphere({center: [x,y,z], radius: r})
Operaciones booleanas: .union(obj), .subtract(obj), .intersect(obj).
Genera ahora el código exacto para cumplir esta petición: `;

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    contents: [{ parts: [{ text: systemInstruction + "\\n\\n" + prompt }] }] 
                })
            });
            
            const data = await res.json();
            
            if(!res.ok) {
                throw new Error(data.error?.message || "Error en la respuesta de Google.");
            }
            
            let text = data.candidates[0].content.parts[0].text;
            
            // Limpieza robusta por si la IA devuelve Markdown
            text = text.replace(/```javascript/gi, "").replace(/```js/gi, "").replace(/```/g, "").trim();
            
            document.getElementById('codeOutput').value = text;
        } catch(e) { 
            console.error(e);
            alert("Error de Conexión o API: " + e.message); 
            document.getElementById('codeOutput').value = "// ERROR DETALLADO:\\n// " + e.message;
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    async function inject() {
        const code = document.getElementById('codeOutput').value.trim();
        const btn = document.getElementById('btnInject');
        
        if(!code) { 
            alert("No hay código generado para inyectar."); 
            return; 
        }
        
        const originalText = btn.innerHTML;
        btn.innerHTML = "⏳ Inyectando...";
        
        try {
            const response = await fetch('/api/inject_code', { 
                method: 'POST', 
                headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({ code }) 
            });
            
            if(response.ok) {
                btn.innerHTML = "✅ INYECCIÓN EXITOSA";
                btn.style.backgroundColor = "#2E7D32"; // Verde oscuro
            } else {
                throw new Error("El backend Python rechazó la conexión.");
            }
        } catch (error) {
            alert("Error de red: " + error.message + "\\n¿Está corriendo Python (main.py)?");
            btn.innerHTML = "❌ ERROR";
            btn.style.backgroundColor = "#D50000";
        } finally {
            // Restaurar botón después de 2.5 segundos
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.backgroundColor = ""; // Vuelve a la clase CSS
            }, 2500);
        }
    }
</script>
</body>
</html>
