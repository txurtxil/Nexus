<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS AI v23.15 - DOUBLE AGENT CORE</title>
    <style>
        body { margin: 0; background-color: #0B0E14; color: #E6EDF3; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; }
        .header { background-color: #161B22; padding: 15px; text-align: center; border-bottom: 2px solid #FFAB00; }
        .header h2 { margin: 0; color: #FFAB00; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }
        .content { padding: 15px; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        label { font-size: 11px; color: #8B949E; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; display: block; }
        input, select, textarea { width: 100%; padding: 12px; background-color: #0B0E14; border: 1px solid #30363D; color: #00E5FF; border-radius: 6px; outline: none; font-size: 13px; box-sizing: border-box; transition: border-color 0.2s; }
        input:focus, textarea:focus, select:focus { border-color: #FFAB00; }
        textarea { height: 90px; font-family: monospace; resize: vertical; }
        button { background-color: #FFAB00; color: #0B0E14; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        button:hover { background-color: #FFC400; transform: translateY(-1px); }
        button:active { transform: translateY(1px); }
        
        .btn-inject { background-color: #B388FF; margin-top: 5px;}
        .btn-inject:hover { background-color: #9575CD; }
        .btn-camera { background-color: #00B0FF; color: #000; margin-bottom: 5px;}
        
        .macro-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-macro { background-color: #161B22; color: #00E676; border: 1px solid #00E676; padding: 10px; font-size: 11px; }
        .btn-macro:hover { background-color: #00E676; color: #000; }
        
        .btn-reverse { background-color: #D50000; color: #FFF; border: 1px solid #FF5252; grid-column: span 2; font-weight: 900; }
        .btn-reverse:hover { background-color: #FF5252; color: #000; box-shadow: 0 0 10px #FF5252; }

        #loader { display: none; text-align: center; color: #FFAB00; font-size: 12px; font-style: italic; margin-top: 5px; }
        
        .toggle-container { display: flex; align-items: center; gap: 10px; background: #161B22; padding: 10px; border-radius: 6px; border: 1px solid #30363D; }
        .toggle-container input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #FFAB00; }
        .toggle-label { font-size: 12px; color: #E6EDF3; cursor: pointer; }

        .slicer-panel { background: #161B22; padding: 12px; border: 1px solid #00E5FF; border-radius: 6px; }
        .slicer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px;}
        .slicer-grid input { padding: 8px; font-weight: bold; color: #FFF;}
        
        .preview-container { position: relative; display: none; width: fit-content; margin-top: 5px; }
        #imagePreview { max-height: 150px; border-radius: 6px; border: 2px solid #00B0FF; }
        .btn-remove-img { position: absolute; top: -5px; right: -5px; background: #D50000; color: white; border: none; border-radius: 50%; width: 24px; height: 24px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; box-shadow: 0 2px 5px rgba(0,0,0,0.5);}
    </style>
</head>
<body>

<div class="header">
    <h2>🤖 Nexus AI Core (v23.15 - DOUBLE AGENT)</h2>
</div>

<div class="content">
    <div>
        <label>API Key (Google Gemini):</label>
        <input type="password" id="apiKey" placeholder="AIzaSy..." value="">
    </div>

    <div>
        <label>Motor IA:</label>
        <input type="text" id="modelSelector" list="modelList" value="gemini-3-flash-preview">
        <datalist id="modelList">
            <option value="gemini-3-flash-preview">
            <option value="gemini-3.1-flash-lite-preview">
            <option value="gemini-2.5-flash">
        </datalist>
    </div>
    
    <div class="toggle-container">
        <label style="color:#FFAB00; font-size: 11px; font-weight: bold; margin:0;">⚡ MODO:</label>
        <select id="aiMode" style="flex-grow: 1; padding: 8px; background: #0B0E14; border: 1px solid #30363D; color: #00E5FF; border-radius: 4px;">
            <option value="architect">🧠 Doble Agente (Texto Natural -> 3D)</option>
            <option value="copilot">🛠️ Copiloto Libre (Programar / Editar)</option>
            <option value="agentic">🎛️ Agentic UI (Mover Slicer App)</option>
        </select>
    </div>

    <div class="slicer-panel">
        <label style="color:#00E5FF; margin:0;">⚙️ G-CODE CAM / SLICER SETTINGS</label>
        <div class="slicer-grid">
            <div><label>Fusor (°C):</label><input type="number" id="nozzle_temp" value="220"></div>
            <div><label>Cama (°C):</label><input type="number" id="bed_temp" value="60"></div>
            <div><label>Velocidad (mm/s):</label><input type="number" id="speed" value="150"></div>
            <div><label>Relleno (%):</label><input type="number" id="infill" value="15"></div>
        </div>
    </div>
    
    <div class="toggle-container" id="memoryContainer" style="display:none;">
        <input type="checkbox" id="useMemory" checked>
        <label for="useMemory" class="toggle-label">🧠 <b>Modo Iterativo:</b> Leer y modificar la pieza actual.</label>
    </div>

    <div>
        <label>Nexus Copilot Macros (Fase 13):</label>
        <div class="macro-grid">
            <button class="btn-macro" onclick="applyGenerativeMacro('lattice')">🧬 Generative Lattice</button>
            <button class="btn-macro" onclick="applyGenerativeMacro('shell')">🔲 Shell / Vaciado</button>
            <button class="btn-macro btn-reverse" onclick="applyGenerativeMacro('reverse')">🔄 Vision-to-Print: Clonar Pieza (Pide Foto + B.Box)</button>
        </div>
    </div>

    <div>
        <label>Visión Artificial (Planos / Pieza Rota):</label>
        <input type="file" id="imageInput" accept="image/*" style="display: none;">
        <button class="btn-camera" onclick="document.getElementById('imageInput').click()">📷 Adjuntar Foto Local</button>
        
        <div class="preview-container" id="previewContainer">
            <img id="imagePreview" src="">
            <button class="btn-remove-img" onclick="removeImage()">✖</button>
        </div>
    </div>

    <div>
        <label>Instrucción / Animación / Errores:</label>
        <textarea id="promptInput" placeholder="Ej: Hazme una base para mi smartphone para ver vídeos en horizontal..."></textarea>
    </div>

    <button onclick="generateCode()" id="btnGenerate">⚡ Analizar / Ejecutar</button>
    <div id="loader">Analizando datos y procesando lógicas...</div>

    <div>
        <label>Respuesta / Código JS (Editable):</label>
        <textarea id="codeOutput" style="height: 160px; color: #FFAB00;"></textarea>
    </div>

    <button class="btn-inject" id="btnInject" onclick="inject()">⚙️ Inyectar al Visor 3D</button>
</div>

<script>
    let currentB64 = null;
    let currentMimeType = null;
    let lastErrorProcessed = ""; 

    async function checkDataBridge() {
        try {
            const res = await fetch('/api/get_vision.json');
            const data = await res.json();
            
            if (data.image_b64 && data.image_b64.trim() !== "") {
                document.getElementById('imagePreview').src = data.image_b64;
                document.getElementById('previewContainer').style.display = 'block';
                currentB64 = data.image_b64.split(',')[1];
                currentMimeType = data.image_b64.split(';')[0].split(':')[1] || "image/jpeg";
            }
            
            if (data.last_error && data.last_error.trim() !== "" && data.last_error !== lastErrorProcessed) {
                lastErrorProcessed = data.last_error;
                const promptBox = document.getElementById('promptInput');

                if(data.last_error.includes("flip")) {
                    promptBox.value = "CRÍTICO: Has causado un error 'flip' en el motor BSP de CSG.js. Evita esto:\n1. NO pases Arrays a booleanas (usa a.subtract(b).subtract(c)).\n2. Z-Fighting: Haz que los cilindros de resta sean MUCHO MÁS LARGOS que la pieza principal para que la atraviesen limpiamente.\nReescribe el código reparando esto.";
                } else {
                    promptBox.value = "He recibido este error en el visor 3D al compilar mi código JS-CSG:\n\n" + data.last_error + "\n\nPor favor, genérame el código corregido respetando csg.js.";
                }
                
                document.getElementById('aiMode').value = "copilot";
                document.getElementById('memoryContainer').style.display = 'flex';
                document.getElementById('useMemory').checked = true;
            }
        } catch(e) {}
    }

    document.addEventListener('DOMContentLoaded', () => {
        const savedKey = localStorage.getItem('nexus_gemini_key');
        if(savedKey) document.getElementById('apiKey').value = savedKey;
        
        document.getElementById('aiMode').addEventListener('change', (e) => {
            const val = e.target.value;
            document.getElementById('memoryContainer').style.display = val === 'copilot' ? 'flex' : 'none';
        });

        checkDataBridge();
        setInterval(checkDataBridge, 1000); 
    });

    document.getElementById('imageInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(!file) return;
        currentMimeType = file.type;
        const reader = new FileReader();
        reader.onload = function(event) {
            document.getElementById('imagePreview').src = event.target.result;
            document.getElementById('previewContainer').style.display = 'block';
            currentB64 = event.target.result.split(',')[1];
        };
        reader.readAsDataURL(file);
    });

    function removeImage() {
        currentB64 = null; currentMimeType = null;
        document.getElementById('imageInput').value = "";
        document.getElementById('previewContainer').style.display = 'none';
    }

    async function getCurrentCode() {
        try {
            const res = await fetch('/api/get_code_b64.json');
            const data = await res.json();
            if(data && data.code_b64) return atob(data.code_b64);
        } catch(e) { return ""; }
        return "";
    }

    function applyGenerativeMacro(type) {
        document.getElementById('aiMode').value = 'copilot';
        document.getElementById('memoryContainer').style.display = 'flex';
        const promptBox = document.getElementById('promptInput');
        
        if (type === 'reverse') {
            document.getElementById('useMemory').checked = false; 
            const copilotData = JSON.parse(localStorage.getItem('nexus_copilot_data') || "null");
            
            if(!currentB64) {
                alert("📷 ¡OJO! Sube primero una foto de la pieza física que quieres clonar.");
                return;
            }

            if(copilotData) {
                promptBox.value = `¡ALERTA DE INGENIERÍA INVERSA!\nB.Box:\n- X: ${copilotData.x} mm\n- Y: ${copilotData.y} mm\n- Z: ${copilotData.z} mm\nAnaliza visualmente la foto y reconstruye la pieza en JS CSG. Usa el B.Box como límite.`;
            } else {
                promptBox.value = `¡ALERTA DE INGENIERÍA INVERSA!\nAnaliza la pieza de la foto adjunta. Reconstruye su geometría en código CSG paramétrico puro (JavaScript, retornando main).`;
            }
        } else if (type === 'lattice') {
            document.getElementById('useMemory').checked = true;
            promptBox.value = "Aplica Optimización Topológica (Generative Design) a esta pieza. Crea una red de vaciados usando CILINDROS (para que la Bambu Lab los imprima mejor) usando bucles (for) y CSG.subtract().";
        } else if (type === 'shell') {
            document.getElementById('useMemory').checked = true;
            promptBox.value = "Aplica un vaciado (Shell) a esta pieza. Réstale una versión de sí misma ligeramente más pequeña para que quede hueca por dentro (grosor de pared 2.4mm).";
        }
        
        if (type !== 'reverse') generateCode();
    }

    function highlightSlider(elementId) {
        const el = document.getElementById(elementId);
        if(el) {
            el.style.transition = "all 0.3s";
            el.style.backgroundColor = "#00E676";
            el.style.color = "#000";
            setTimeout(() => {
                el.style.backgroundColor = "#0B0E14";
                el.style.color = "#FFF";
            }, 800);
        }
    }

    // Función auxiliar para llamar a la API de Gemini
    async function fetchGemini(model, key, systemInstruction, promptText, imageB64 = null, mimeType = null) {
        let payloadParts = [{ text: systemInstruction + "\n\n" + promptText }];
        if (imageB64) payloadParts.push({ inlineData: { mimeType: mimeType, data: imageB64 } });

        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ contents: [{ parts: payloadParts }] })
        });
        const data = await res.json();
        if(!res.ok) throw new Error(data.error?.message);
        return data.candidates[0].content.parts[0].text.trim();
    }

    async function generateCode() {
        const key = document.getElementById('apiKey').value.trim();
        const prompt = document.getElementById('promptInput').value.trim();
        const aiMode = document.getElementById('aiMode').value;
        const useMemory = document.getElementById('useMemory').checked;
        const selectedModel = document.getElementById('modelSelector').value.trim(); 
        
        if(!key || (!prompt && !currentB64)) { alert("⚠️ Faltan datos."); return; }
        if(!selectedModel) { alert("⚠️ Especifica un modelo IA."); return; }
        
        localStorage.setItem('nexus_gemini_key', key);
        document.getElementById('loader').style.display = 'block';
        document.getElementById('codeOutput').value = "";

        try {
            let finalCodeText = "";

            // 🔥 FASE 16: DOBLE AGENTE (Traductor Natural -> Ingeniero 3D)
            if (aiMode === "architect") {
                document.getElementById('loader').innerText = "🧠 Arquitecto: Traduciendo a especificaciones mecánicas...";
                
                const archSystem = `Eres el Arquitecto Mecánico Jefe. El usuario te pedirá objetos cotidianos en lenguaje natural. 
Tu tarea: Traducir su deseo a un pliego técnico estricto de diseño 3D.
Debes detallar: 
1. Primitivas base a usar (cubos, cilindros).
2. Medidas lógicas en milímetros (dedúcelas: ej. un vaso mide 80x80x100mm, un móvil 75x150x10mm).
3. Operaciones booleanas requeridas (cortes, uniones).
Devuelve SOLO la especificación técnica en 3-4 viñetas. Nada más.`;
                
                let techPlan = await fetchGemini("gemini-3-flash-preview", key, archSystem, `Deseo del usuario: "${prompt}"`, currentB64, currentMimeType);
                
                document.getElementById('loader').innerText = `⚙️ Programador: Escribiendo código CSG con ${selectedModel}...`;
                
                const coderSystem = `Eres NEXUS TITAN AI, experto en Diseño Paramétrico 3D usando 'csg.js'.
Tu objetivo es devolver código JavaScript puro basado EXACTAMENTE en la especificación técnica dada.
NUNCA uses markdown ni \`\`\`javascript.
El código DEBE contener una función global 'main(params)'.

⛔ REGLAS VITALES:
1. NO PASES ARRAYS a booleanas (usa a.subtract(b).subtract(c)).
2. CARAS COPLANARES: Objetos de resta deben ser MUCHO MÁS LARGOS que la pieza a cortar.
3. LÍMITE FÍSICO 180mm: Si excede 170mm, usa .scale() antes de retornar.`;

                let rawCode = await fetchGemini(selectedModel, key, coderSystem, `Escribe el código para este plan técnico:\n\n${techPlan}`);
                
                rawCode = rawCode.replace(/```javascript/gi, "").replace(/```js/gi, "").replace(/```/g, "").trim();
                
                // Formateamos la salida para que el usuario vea la magia del Doble Agente
                finalCodeText = `/* ========================================\n   🧠 PLAN TÉCNICO DEL ARQUITECTO:\n----------------------------------------\n${techPlan}\n======================================== */\n\n${rawCode}`;
                document.getElementById('codeOutput').value = finalCodeText;
            } 
            else if (aiMode === "agentic") {
                document.getElementById('loader').innerText = `🎛️ Agente Slicer analizando perfil de material...`;
                const slicerSystem = `Eres el Agente CAM de NEXUS. Configura los parámetros de laminado (Slicer) para la Bambu Lab A1 Mini. Devuelve ÚNICAMENTE un JSON válido.
Estructura: {"tool": "slicer", "params": {"nozzle_temp": num, "bed_temp": num, "speed": num, "infill": num}}
Perfiles:
- PLA: Fusor 220, Cama 60, Vel 150-200, Relleno 10-15%.
- PETG: Fusor 240, Cama 70, Vel 60, Relleno 30-50%.
- TPU: Fusor 230, Cama 40, Vel 30, Relleno 20%.
- ABS: Fusor 260, Cama 90, Vel 50, Relleno 40%.`;
                
                let text = await fetchGemini("gemini-3-flash-preview", key, slicerSystem, prompt);
                text = text.replace(/```json/gi, "").replace(/```/g, "").trim();
                let jsonPayload = JSON.parse(text);
                document.getElementById('codeOutput').value = "JSON INTERCEPTADO (Slicer Actualizado):\n" + JSON.stringify(jsonPayload, null, 2);
                
                if (jsonPayload.tool === "slicer" && jsonPayload.params) {
                    if(jsonPayload.params.nozzle_temp) { document.getElementById('nozzle_temp').value = jsonPayload.params.nozzle_temp; highlightSlider('nozzle_temp'); }
                    if(jsonPayload.params.bed_temp) { document.getElementById('bed_temp').value = jsonPayload.params.bed_temp; highlightSlider('bed_temp'); }
                    if(jsonPayload.params.speed) { document.getElementById('speed').value = jsonPayload.params.speed; highlightSlider('speed'); }
                    if(jsonPayload.params.infill) { document.getElementById('infill').value = jsonPayload.params.infill; highlightSlider('infill'); }
                }
                await fetch('/api/agentic_ui', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: text });
            } 
            else {
                document.getElementById('loader').innerText = `🛠️ Copiloto procesando código...`;
                let sys = `Eres NEXUS TITAN AI, experto en 'csg.js'. Devuelve JS puro, NUNCA markdown. Retorna main(params). Reglas Anti-Flip: Cero Arrays, restas exageradamente largas. Límite: 180mm.`;
                let finalPrompt = prompt;
                if (useMemory) {
                    let currentCode = await getCurrentCode();
                    if (currentCode && currentCode.trim() !== "") {
                        sys += `\nMantén la estructura actual.`;
                        finalPrompt = `--- CÓDIGO ACTUAL ---\n${currentCode}\n---------------------\nINSTRUCCIÓN: ${prompt}`;
                    }
                }
                let text = await fetchGemini(selectedModel, key, sys, finalPrompt, currentB64, currentMimeType);
                text = text.replace(/```javascript/gi, "").replace(/```js/gi, "").replace(/```/g, "").trim();
                document.getElementById('codeOutput').value = text;
            }
        } catch(e) { 
            document.getElementById('codeOutput').value = "// ERROR:\n" + e.message;
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    async function inject() {
        if(document.getElementById('aiMode').value === "agentic") {
            alert("⚠️ En Modo Agentic UI la IA configura el Slicer. No hay modelo 3D que inyectar."); return;
        }
        const code = document.getElementById('codeOutput').value.trim();
        if(!code) return;
        const btn = document.getElementById('btnInject');
        const originalText = btn.innerHTML; btn.innerHTML = "⏳ Inyectando...";
        
        try {
            const response = await fetch('/api/inject_code', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ code }) });
            if(response.ok) { btn.innerHTML = "✅ INYECTADO"; btn.style.backgroundColor = "#00E676"; btn.style.color = "#000"; } 
            else throw new Error("Rechazado por backend.");
        } catch (error) {
            alert("Error de Red: " + error.message); btn.innerHTML = "❌ ERROR DE RED"; btn.style.backgroundColor = "#D50000";
        } finally {
            setTimeout(() => { btn.innerHTML = originalText; btn.style.backgroundColor = "#B388FF"; btn.style.color = "#FFF"; }, 2500);
            removeImage();
            lastErrorProcessed = ""; 
        }
    }
</script>
</body>
</html>
