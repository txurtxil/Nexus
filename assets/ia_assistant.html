<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS AI v21.2 - VISION & COPILOT</title>
    <style>
        body { margin: 0; background-color: #0B0E14; color: #E6EDF3; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; }
        .header { background-color: #161B22; padding: 15px; text-align: center; border-bottom: 2px solid #B388FF; }
        .header h2 { margin: 0; color: #B388FF; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }
        .content { padding: 15px; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        label { font-size: 11px; color: #8B949E; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        input, select, textarea { width: 100%; padding: 12px; background-color: #0B0E14; border: 1px solid #30363D; color: #00E5FF; border-radius: 6px; outline: none; font-size: 13px; box-sizing: border-box; transition: border-color 0.2s; }
        input:focus, textarea:focus { border-color: #B388FF; }
        textarea { height: 90px; font-family: monospace; resize: vertical; }
        button { background-color: #B388FF; color: #0B0E14; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        button:hover { background-color: #9575CD; transform: translateY(-1px); }
        button:active { transform: translateY(1px); }
        
        .btn-inject { background-color: #00E676; margin-top: 5px;}
        .btn-inject:hover { background-color: #00C853; }
        .btn-camera { background-color: #00B0FF; color: #000; margin-bottom: 5px;}
        
        #loader { display: none; text-align: center; color: #B388FF; font-size: 12px; font-style: italic; margin-top: 5px; }
        
        .toggle-container { display: flex; align-items: center; gap: 10px; background: #161B22; padding: 10px; border-radius: 6px; border: 1px solid #30363D; }
        .toggle-container input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #B388FF; }
        .toggle-label { font-size: 12px; color: #E6EDF3; cursor: pointer; }
        
        .preview-container { position: relative; display: none; width: fit-content; margin-top: 5px; }
        #imagePreview { max-height: 150px; border-radius: 6px; border: 2px solid #00B0FF; }
        .btn-remove-img { position: absolute; top: -5px; right: -5px; background: #D50000; color: white; border: none; border-radius: 50%; width: 24px; height: 24px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; box-shadow: 0 2px 5px rgba(0,0,0,0.5);}
    </style>
</head>
<body>

<div class="header">
    <h2>🤖 Nexus AI Copilot (Vision 3.1)</h2>
</div>

<div class="content">
    <div>
        <label>API Key (Google Gemini):</label>
        <input type="password" id="apiKey" placeholder="AIzaSy..." value="">
    </div>
    
    <div class="toggle-container">
        <input type="checkbox" id="useMemory" checked>
        <label for="useMemory" class="toggle-label">🧠 <b>Modo Iterativo:</b> Leer y modificar la pieza actual del visor.</label>
    </div>

    <div>
        <label>Análisis de Planos y Bocetos:</label>
        <input type="file" id="imageInput" accept="image/*" style="display: none;">
        <button class="btn-camera" onclick="document.getElementById('imageInput').click()">📷 Adjuntar Foto o Plano</button>
        
        <div class="preview-container" id="previewContainer">
            <img id="imagePreview" src="">
            <button class="btn-remove-img" onclick="removeImage()">✖</button>
        </div>
    </div>

    <div>
        <label>Instrucción para la IA:</label>
        <textarea id="promptInput" placeholder="Ej: Genera la pieza del plano adjunto... o hazle un agujero en el centro."></textarea>
    </div>

    <button onclick="generateCode()">⚡ Generar / Analizar Código</button>
    <div id="loader">Analizando geometría y conectando con Gemini 3.1...</div>

    <div>
        <label>Código JS-CSG Generado (Editable):</label>
        <textarea id="codeOutput" style="height: 160px; color: #00E676;"></textarea>
    </div>

    <button class="btn-inject" id="btnInject" onclick="inject()">⚙️ Inyectar al Motor 3D</button>
</div>

<script>
    let currentB64 = null;
    let currentMimeType = null;

    document.addEventListener('DOMContentLoaded', () => {
        const savedKey = localStorage.getItem('nexus_gemini_key');
        if(savedKey) document.getElementById('apiKey').value = savedKey;
    });

    // Lógica para previsualizar y transformar la imagen a Base64
    document.getElementById('imageInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(!file) return;
        
        currentMimeType = file.type;
        const reader = new FileReader();
        
        reader.onload = function(event) {
            const result = event.target.result;
            document.getElementById('imagePreview').src = result;
            document.getElementById('previewContainer').style.display = 'block';
            // Extraer solo la parte Base64 (quitando el data:image/jpeg;base64,)
            currentB64 = result.split(',')[1];
        };
        reader.readAsDataURL(file);
    });

    function removeImage() {
        currentB64 = null;
        currentMimeType = null;
        document.getElementById('imageInput').value = "";
        document.getElementById('previewContainer').style.display = 'none';
    }

    async function getCurrentCode() {
        try {
            const res = await fetch('/api/get_code_b64.json');
            const data = await res.json();
            if(data && data.code_b64) return atob(data.code_b64);
        } catch(e) { return ""; }
        return "";
    }

    async function generateCode() {
        const key = document.getElementById('apiKey').value.trim();
        const prompt = document.getElementById('promptInput').value.trim();
        const useMemory = document.getElementById('useMemory').checked;
        
        if(!key || (!prompt && !currentB64)) { 
            alert("⚠️ Faltan datos. Introduce una instrucción o sube una imagen."); 
            return; 
        }
        
        localStorage.setItem('nexus_gemini_key', key);
        document.getElementById('loader').style.display = 'block';
        document.getElementById('codeOutput').value = "";

        // System Prompt Mejorado para Visión Artificial
        let systemInstruction = `Eres NEXUS TITAN AI, un experto en geometría 3D y lectura de planos industriales.
Tu ÚNICO objetivo es devolver código JavaScript puro usando CSG.js, sin markdown y sin explicaciones.
El código DEBE contener una función global 'main()' que retorne un objeto CSG válido.
Primitivas: CSG.cube(), CSG.cylinder(), CSG.sphere().
Función inyectada: roundedBox(width, depth, height, radius).
Si el usuario adjunta una imagen (boceto, croquis o plano), extrae las medidas, cotas y proporciones exactas para modelar la pieza al milímetro.`;

        let finalPrompt = prompt;

        if (useMemory) {
            let currentCode = await getCurrentCode();
            if (currentCode && currentCode.trim() !== "") {
                systemInstruction += `\n\nATENCIÓN: Mantén la estructura de la pieza actual. Añade o modifica según pida el usuario o muestre el plano.`;
                finalPrompt = `--- CÓDIGO ACTUAL ---\n${currentCode}\n---------------------\n\nINSTRUCCIÓN: Modifica este código para cumplir la siguiente petición (y/o basándote en la imagen adjunta): "${prompt}".`;
            } else {
                finalPrompt = `Genera el código para: ${prompt}`;
            }
        } else {
            finalPrompt = `Genera desde cero el código para: ${prompt}`;
        }

        // Construir el Payload Multimodal
        let payloadParts = [{ text: systemInstruction + "\n\n" + finalPrompt }];
        
        // Si hay una imagen cargada, inyectarla en el mensaje para Gemini
        if (currentB64) {
            payloadParts.push({
                inlineData: {
                    mimeType: currentMimeType,
                    data: currentB64
                }
            });
        }

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${key}`, {
                method: 'POST', 
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    contents: [{ parts: payloadParts }] 
                })
            });
            
            const data = await res.json();
            if(!res.ok) throw new Error(data.error?.message || "Error en la API de Google.");
            
            let text = data.candidates[0].content.parts[0].text;
            text = text.replace(/```javascript/gi, "").replace(/```js/gi, "").replace(/```/g, "").trim();
            
            document.getElementById('codeOutput').value = text;
        } catch(e) { 
            console.error(e);
            document.getElementById('codeOutput').value = "// ERROR:\n// " + e.message;
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

        const code = document.getElementById('codeOutput').value.trim();
        const btn = document.getElementById('btnInject');
