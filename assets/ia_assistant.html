<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS AI v21.1 - TRIPLE POWER</title>
    <style>
        body { margin: 0; background-color: #0B0E14; color: #E6EDF3; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        .header { background-color: #161B22; padding: 15px; text-align: center; border-bottom: 2px solid #00E5FF; }
        .header h2 { margin: 0; color: #00E5FF; font-size: 18px; }
        .content { padding: 15px; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        label { font-size: 11px; color: #8B949E; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; background-color: #0B0E14; border: 1px solid #30363D; color: #00E5FF; border-radius: 5px; outline: none; font-size: 13px; }
        textarea { height: 100px; font-family: monospace; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; color: white; font-size: 12px; }
        .blue { background: #0277BD; } .purple { background: #8E24AA; } .green { background: #00E676; color: black; }
        #visionContainer { display: none; background: #161B22; padding: 10px; border-radius: 8px; border: 1px dashed #00E5FF; text-align: center; position: relative; }
        #visionPreview { max-width: 100%; max-height: 150px; border-radius: 5px; }
        .loader { display: none; text-align: center; color: #00E5FF; font-size: 12px; margin: 10px 0; }
    </style>
</head>
<body>

<div class="header">
    <h2>👁️ NEXUS AI v21.1 (Gemini 3 Flash Core)</h2>
</div>

<div class="content">
    <div id="visionContainer">
        <label>📷 IMAGEN DETECTADA (Logo o Pieza)</label>
        <img id="visionPreview" src="">
        <button onclick="clearVision()" style="position:absolute; top:5px; right:5px; background:red; color:white; border:none; border-radius:50%; width:20px; height:20px; cursor:pointer;">X</button>
    </div>

    <div>
        <label>🔑 API KEY GEMINI (v3 / v2.5)</label>
        <input type="password" id="apiKey" placeholder="Pega tu clave AIzaSy... aquí">
    </div>

    <div>
        <label>📝 PROMPT / LOGO / ERROR</label>
        <textarea id="promptInput" placeholder="Describe una pieza, pide ensamblar objetos, o recibe auto-errores del visor aquí..."></textarea>
    </div>

    <div class="btn-group">
        <button class="btn blue" onclick="process('code')">🛠️ GEN/FIX CÓDIGO</button>
        <button class="btn purple" onclick="process('vision')">🔍 ANALIZAR VISIÓN</button>
    </div>

    <div class="loader" id="loader">Gemini 3 está pensando... ⏳</div>

    <div>
        <label>💻 RESULTADO DE LA IA</label>
        <textarea id="codeOutput" style="height: 180px;"></textarea>
    </div>

    <button class="btn green" style="width:100%" onclick="inject()">🚀 INYECTAR A NEXUS</button>
</div>

<script>
    document.getElementById('apiKey').value = localStorage.getItem('nexus_api_key') || '';
    let currentVisionB64 = "";

    async function checkDataBridge() {
        try {
            const res = await fetch('/api/get_vision.json');
            const data = await res.json();
            
            if (data.image_b64) {
                currentVisionB64 = data.image_b64.split(',')[1];
                document.getElementById('visionPreview').src = data.image_b64;
                document.getElementById('visionContainer').style.display = 'block';
            }
            
            if (data.last_error && data.last_error.trim() !== "") {
                const promptBox = document.getElementById('promptInput');
                promptBox.value = "He recibido este error en el visor 3D al compilar mi código JS-CSG:\n\n" + data.last_error + "\n\nPor favor, genérame el código corregido que solucione esto.";
            }
        } catch(e) {}
    }
    
    window.onload = checkDataBridge;
    window.onfocus = checkDataBridge;

    function clearVision() { currentVisionB64 = ""; document.getElementById('visionContainer').style.display = 'none'; }

    async function process(mode) {
        const key = document.getElementById('apiKey').value.trim();
        const prompt = document.getElementById('promptInput').value.trim();
        if(!key) return alert("Falta API Key de Gemini");
        localStorage.setItem('nexus_api_key', key);
        document.getElementById('loader').style.display = 'block';
        document.getElementById('codeOutput').value = '';

        let sysPrompt = "Eres un ingeniero experto en diseño paramétrico 3D OpenJSCAD (JS-CSG).\n";
        sysPrompt += "REGLAS:\n1. Usa primitivas: CSG.cube, CSG.cylinder, CSG.sphere, CSG.polygon.\n2. Operaciones: .union(), .subtract(), .intersect().\n3. Retorna 'return UTILS.mat(objeto);'.\n4. Solo código JS. Sin texto markdown.\n";
        
        if(mode === 'code') {
            sysPrompt += "Si el usuario te envía un error de consola, corrige su código subyacente. Si pide un ensamblaje, genera múltiples variables y únelas.";
        } else {
            sysPrompt += "Si el usuario adjunta un logo 2D: Devuelve código con un CSG.polygon() y extruyelo. Si es una pieza 3D: Realiza un informe de análisis de estrés mecánico.";
        }

        try {
            const parts = [{ text: sysPrompt + "\n\nSolicitud del usuario: " + prompt }];
            if(currentVisionB64) parts.push({ inlineData: { mimeType: "image/jpeg", data: currentVisionB64 } });

            // NUEVO ENDPOINT ACTUALIZADO A 2026: gemini-3-flash-preview (o 2.5-flash)
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${key}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ contents: [{ parts }] })
            });
            const data = await res.json();
            
            if(data.error) {
                // Si el modelo 3 falla por alguna razón de despliegue local, hacemos fallback al 2.5-flash
                if(data.error.code === 404 || data.error.message.includes("not found")) {
                    console.log("Fallback a gemini-2.5-flash");
                    const resFb = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ contents: [{ parts }] })
                    });
                    const dataFb = await resFb.json();
                    if(dataFb.error) throw new Error(dataFb.error.message);
                    data.candidates = dataFb.candidates;
                } else {
                    throw new Error(data.error.message);
                }
            }
            
            let text = data.candidates[0].content.parts[0].text;
            if(text.includes("```")) text = text.split("```")[1].replace(/^javascript/i, "").replace(/^js/i, "").trim();
            document.getElementById('codeOutput').value = text;
        } catch(e) { 
            alert("Error de API: " + e.message); 
            document.getElementById('codeOutput').value = "ERROR DETALLADO:\n" + e.message;
        }
        document.getElementById('loader').style.display = 'none';
    }

    async function inject() {
        const code = document.getElementById('codeOutput').value.trim();
        if(!code) return;
        await fetch('/api/inject_code', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ code }) });
        alert("✓ Código Inyectado. Cierra y vuelve a la App.");
    }
</script>
</body>
</html>
