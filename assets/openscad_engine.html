<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: monospace; }
        canvas { background: #050505; border: 2px solid #1a1a1a; width: 95vw; height: 70vh; image-rendering: pixelated; }
        #status { color: #00ff00; padding: 10px; font-size: 14px; text-shadow: 0 0 5px #000; }
    </style>
</head>
<body>
    <div id="status">● ESPERANDO DATOS...</div>
    <canvas id="cvs"></canvas>

    <script>
        const canvas = document.getElementById('cvs');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');

        function resize() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
            draw("cube"); // Dibujo inicial de prueba
        }

        function draw(type) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 4;
            ctx.strokeStyle = "#00e676"; // Verde neón
            
            const x = canvas.width / 2;
            const y = canvas.height / 2;
            const s = 60;

            if (type.includes("sphere")) {
                ctx.beginPath(); ctx.arc(x, y, s, 0, Math.PI * 2); ctx.stroke();
                ctx.strokeStyle = "#008a4c";
                ctx.beginPath(); ctx.ellipse(x, y, s, s/3, 0, 0, Math.PI * 2); ctx.stroke();
                status.innerHTML = "● RENDER: ESFERA";
            } else if (type.includes("cylinder")) {
                ctx.strokeRect(x - s, y - s, s * 2, s * 2);
                ctx.beginPath(); ctx.ellipse(x, y-s, s, s/4, 0, 0, Math.PI * 2); ctx.stroke();
                ctx.beginPath(); ctx.ellipse(x, y+s, s, s/4, 0, 0, Math.PI * 2); ctx.stroke();
                status.innerHTML = "● RENDER: CILINDRO";
            } else {
                // Cubo alámbrico
                ctx.strokeRect(x - s, y - s, s, s);
                ctx.strokeRect(x - s + 20, y - s - 20, s, s);
                ctx.beginPath();
                ctx.moveTo(x-s, y-s); ctx.lineTo(x-s+20, y-s-20);
                ctx.moveTo(x, y-s); ctx.lineTo(x+20, y-s-20);
                ctx.moveTo(x-s, y); ctx.lineTo(x-s+20, y-20);
                ctx.moveTo(x, y); ctx.lineTo(x+20, y-20);
                ctx.stroke();
                status.innerHTML = "● RENDER: CUBO";
            }
        }

        window.processOpenScad = function(c) {
            draw(c.toLowerCase());
        };

        window.addEventListener('resize', resize);
        setTimeout(resize, 100);
    </script>
</body>
</html>
