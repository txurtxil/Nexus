<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS CAD PRO - Motor LOD & HD Export</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/STLExporter.js"></script>
    
    <style>
        :root { --nexus-cyan: #00E5FF; --nexus-green: #00E676; --nexus-purple: #B388FF; --nexus-bg: rgba(11, 14, 20, 0.85); --nexus-border: #30363D; }
        body { margin: 0; overflow: hidden; background-color: #0B0E14; font-family: 'Segoe UI', sans-serif; color: #E6EDF3; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        .nexus-panel { position: absolute; background: var(--nexus-bg); border: 1px solid var(--nexus-border); border-radius: 6px; padding: 12px; z-index: 10; backdrop-filter: blur(8px); box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        
        #toolbar { top: 15px; left: 15px; display: flex; gap: 10px; }
        #loader { bottom: 15px; right: 15px; display: none; font-weight: bold; color: var(--nexus-cyan); border-color: var(--nexus-cyan); }
        
        button.btn-hd { background: var(--nexus-purple); color: #000; font-weight: bold; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; transition: 0.2s; text-transform: uppercase; font-size: 12px; }
        button.btn-hd:hover { background: #9575CD; transform: translateY(-2px); }
        button.btn-hd:active { transform: translateY(0); }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="toolbar" class="nexus-panel">
        <button class="btn-hd" onclick="triggerHDExport()">💎 Exportar STL (HD)</button>
    </div>
    
    <div id="loader" class="nexus-panel">⚙️ Compilando Malla...</div>

    <script>
        // --- VARIABLES GLOBALES DEL MOTOR ---
        let scene, camera, renderer, controls, currentMesh;
        window.NEXUS_HD_EXPORT = false;
        let isExportingProcess = false; 
        let lastCode = "";
        let currentStlHash = "";

        // --- INICIALIZACIÓN THREE.JS ---
        function initWebGL() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0B0E14);
            
            // Grid y Luces
            const gridHelper = new THREE.GridHelper(200, 50, 0x30363D, 0x161B22);
            scene.add(gridHelper);
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(50, 200, 100);
            scene.add(dirLight);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.set(50, 50, 50);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.1;

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // --- SISTEMA DYNAMIC LOD Y REPARACIÓN ---
        function executeCSGCode(rawCode) {
            if (!rawCode) return;
            document.getElementById('loader').style.display = 'block';
            
            let optimizedCode = rawCode;
            
            // 1. INYECCIÓN LOD POR REGEX 
            if (window.NEXUS_HD_EXPORT) {
                optimizedCode = optimizedCode.replace(/slices\s*:\s*\d+/g, 'slices: 128'); 
                document.getElementById('loader').innerHTML = "💎 Renderizando HD (128 slices)...";
            } else {
                optimizedCode = optimizedCode.replace(/slices\s*:\s*\d+/g, 'slices: 24'); 
                document.getElementById('loader').innerHTML = "⚡ Renderizando Modo Rápido...";
            }

            // 2. INYECCIÓN DEL MÓDULO FILLET (Chaflanes Suaves)
            const filletHelper = `
            // Helper inyectado para generar cajas con bordes redondeados
            function roundedBox(w, d, h, r) {
                var res = ${window.NEXUS_HD_EXPORT ? 128 : 24};
                w=Math.max(0.1,w); d=Math.max(0.1,d); h=Math.max(0.1,h); r=Math.min(r, w/2, d/2);
                if(r<=0) return CSG.cube({radius:[w/2, d/2, h/2]});
                var b1 = CSG.cube({radius:[w/2-r, d/2, h/2]});
                var b2 = CSG.cube({radius:[w/2, d/2-r, h/2]});
                var c1 = CSG.cylinder({start:[w/2-r, d/2-r, -h/2], end:[w/2-r, d/2-r, h/2], radius:r, slices:res});
                var c2 = CSG.cylinder({start:[-w/2+r, d/2-r, -h/2], end:[-w/2+r, d/2-r, h/2], radius:r, slices:res});
                var c3 = CSG.cylinder({start:[w/2-r, -d/2+r, -h/2], end:[w/2-r, -d/2+r, h/2], radius:r, slices:res});
                var c4 = CSG.cylinder({start:[-w/2+r, -d/2+r, -h/2], end:[-w/2+r, -d/2+r, h/2], radius:r, slices:res});
                return b1.union([b2, c1, c2, c3, c4]);
            }
            `;
            optimizedCode = optimizedCode.replace("function main() {", "function main() {\n" + filletHelper);

            try {
                // Lógica del worker o evaluador CSG
                // ...
                setTimeout(() => { onMeshGenerated(); }, 500); 
            } catch (e) {
                console.error("Error en motor JS-CSG:", e);
                document.getElementById('loader').style.display = 'none';
            }
        }

        // --- LÓGICA DE EXPORTACIÓN HD ---
        function triggerHDExport() {
            if(!lastCode) return alert("No hay geometría para exportar.");
            isExportingProcess = true;
            window.NEXUS_HD_EXPORT = true;
            executeCSGCode(lastCode); 
        }

        function onMeshGenerated() {
            document.getElementById('loader').style.display = 'none';
            
            if (isExportingProcess) {
                const exporter = new THREE.STLExporter();
                // AQUI: const stlString = exporter.parse( currentMesh ); 
                alert("✓ Pieza calculada en HD. (Falta enganchar tu malla final al STLExporter)");
                
                isExportingProcess = false;
                window.NEXUS_HD_EXPORT = false;
                executeCSGCode(lastCode); 
            }
        }

        // --- POLLING LOCALHOST ---
        function checkServer() {
            fetch(window.location.origin + '/api/get_code_b64.json')
                .then(r => r.json())
                .then(data => {
                    if (data && data.code_b64) {
                        let decoded = atob(data.code_b64);
                        if (decoded !== lastCode && !isExportingProcess) { 
                            lastCode = decoded; 
                            executeCSGCode(lastCode); 
                        }
                    }
                }).catch(e => {});
        }
        
        window.onload = () => { initWebGL(); setInterval(checkServer, 1000); };
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
</body>
</html>
