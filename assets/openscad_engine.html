<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; background: #0a0a0a; color: #00ff00; font-family: monospace; overflow: hidden; }
        #container { width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        canvas { border: 1px solid #333; background: #000; width: 90%; height: 70%; }
        #msg { margin-top: 10px; padding: 10px; border: 1px solid #00ff00; background: rgba(0,255,0,0.1); border-radius: 5px; font-size: 12px; }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="canvas"></canvas>
        <div id="msg">🟢 SISTEMA LISTO: Esperando código...</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const msg = document.getElementById('msg');

        // Ajustar resolución del canvas
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;

        function drawObject(type) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "#00ff00";
            ctx.lineWidth = 2;
            
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            if (type === "sphere") {
                ctx.beginPath();
                ctx.arc(cx, cy, 60, 0, Math.PI * 2);
                ctx.stroke();
                // Simulación de 3D (sombras)
                ctx.beginPath();
                ctx.ellipse(cx, cy, 60, 20, 0, 0, Math.PI * 2);
                ctx.stroke();
            } else if (type === "cylinder") {
                ctx.strokeRect(cx - 40, cy - 60, 80, 120);
                ctx.beginPath();
                ctx.ellipse(cx, cy - 60, 40, 15, 0, 0, Math.PI * 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.ellipse(cx, cy + 60, 40, 15, 0, 0, Math.PI * 2);
                ctx.stroke();
            } else {
                // Cubo por defecto
                ctx.strokeRect(cx - 50, cy - 50, 100, 100);
                ctx.strokeRect(cx - 30, cy - 70, 100, 100);
                ctx.beginPath();
                ctx.moveTo(cx - 50, cy - 50); ctx.lineTo(cx - 30, cy - 70);
                ctx.moveTo(cx + 50, cy - 50); ctx.lineTo(cx + 70, cy - 70);
                ctx.moveTo(cx - 50, cy + 50); ctx.lineTo(cx - 30, cy + 30);
                ctx.moveTo(cx + 50, cy + 50); ctx.lineTo(cx + 70, cy + 30);
                ctx.stroke();
            }
        }

        // Esta es la función que Flet llamará
        window.processOpenScad = function(code) {
            msg.innerHTML = "🛠️ PROCESANDO: " + code.substring(0, 20) + "...";
            const lowCode = code.toLowerCase();
            
            if (lowCode.includes("sphere")) drawObject("sphere");
            else if (lowCode.includes("cylinder")) drawObject("cylinder");
            else drawObject("cube");
            
            setTimeout(() => {
                msg.innerHTML = "✅ RENDERIZADO COMPLETADO";
            }, 500);
        };

        // Dibujo inicial
        drawObject("cube");
    </script>
</body>
</html>
