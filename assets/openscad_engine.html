
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS CAD PRO - Motor Web Worker & VR</title>
    <style>
        :root { --nexus-cyan: #00E5FF; --nexus-green: #00E676; --nexus-purple: #B388FF; --nexus-bg: rgba(11, 14, 20, 0.85); --nexus-border: #30363D; }
        body { margin: 0; overflow: hidden; background-color: #0B0E14; font-family: 'Segoe UI', sans-serif; color: #E6EDF3; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        .nexus-panel { position: absolute; background: var(--nexus-bg); border: 1px solid var(--nexus-border); border-radius: 6px; padding: 12px; z-index: 10; backdrop-filter: blur(8px); box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        
        #toolbar { top: 15px; left: 15px; display: flex; flex-direction: column; gap: 8px; width: 140px; }
        .btn { background: #21262D; border: 1px solid var(--nexus-border); color: #fff; padding: 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; text-transform: uppercase; text-align: left; display: flex; justify-content: space-between; transition: all 0.2s; }
        .btn:hover { background: #30363D; }
        .btn:active { transform: scale(0.95); }
        
        #hud-panel { bottom: 15px; right: 15px; width: 230px; font-size: 10px; border-top: 3px solid var(--nexus-cyan); }
        .hud-section-title { color: var(--nexus-cyan); font-weight: bold; text-transform: uppercase; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid var(--nexus-border); letter-spacing: 1px; }
        .hud-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .hud-label { color: #8B949E; }
        .hud-value { color: #fff; font-family: 'Courier New', monospace; text-align: right; }
        .hud-value.highlight { color: var(--nexus-green); font-weight: bold; }
        .hud-value.purple { color: var(--nexus-purple); font-weight: bold; }
        
        #console { top: 15px; right: 15px; width: 250px; max-height: 200px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 10px; display: none; border-top: 3px solid #FFAB00; }
        .log-sys { color: var(--nexus-cyan); } .log-ok { color: var(--nexus-green); } .log-err { color: #FF5252; }
        
        #loader { display: none; position: absolute; bottom: 15px; left: 15px; z-index: 20; background: var(--nexus-bg); padding: 10px 20px; border-radius: 6px; border-left: 3px solid var(--nexus-cyan); align-items: center; gap: 10px; }
        .spinner { border: 2px solid rgba(0, 229, 255, 0.2); border-top: 2px solid var(--nexus-cyan); border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Custom VR Button Style override */
        #VRButton { border: 1px solid var(--nexus-purple) !important; background: rgba(22, 27, 34, 0.9) !important; color: var(--nexus-purple) !important; border-radius: 6px !important; font-weight: bold !important; font-family: 'Segoe UI', sans-serif !important; letter-spacing: 1px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="canvas-container"></div>
    
    <div id="toolbar" class="nexus-panel">
        <button class="btn" style="border-left: 3px solid #00E676;" onclick="toggleAutoRotate()">Rotar <span>🔄</span></button>
        <button class="btn" style="border-left: 3px solid #6200EA;" onclick="toggleCamera()">Cámara <span>🎥</span></button>
        <button class="btn" style="border-left: 3px solid #FFAB00;" onclick="changeMaterial()">Pintura <span>🎨</span></button>
        <button class="btn" style="border-left: 3px solid #D50000;" onclick="exportFile('stl')">Guardar STL <span>🧊</span></button>
        <button class="btn" style="border-left: 3px solid #C51162;" onclick="exportFile('obj')">Guardar OBJ <span>📦</span></button>
        <button class="btn" style="border-left: 3px solid #00B0FF;" onclick="toggleConsole()">Motor Logs <span>🖥️</span></button>
    </div>

    <div id="hud-panel" class="nexus-panel">
        <div class="hud-section-title">🔌 Telemetría Cliente</div>
        <div class="hud-row"><span class="hud-label">Procesadores:</span> <span class="hud-value highlight" id="hw-cpu">-</span></div>
        <div class="hud-row"><span class="hud-label">Memoria RAM:</span> <span class="hud-value purple" id="hw-ram">N/A</span></div>
        <div class="hud-row"><span class="hud-label">GPU Render:</span> <span class="hud-value" id="hw-gpu">Buscando...</span></div>
        <div class="hud-row"><span class="hud-label">Batería:</span> <span class="hud-value" id="hw-bat">🔌 AC</span></div>
        <div class="hud-row"><span class="hud-label">Red / Conexión:</span> <span class="hud-value" id="hw-net">Local</span></div>
        <div style="height: 10px;"></div>
        <div class="hud-section-title">📐 Análisis de Geometría</div>
        <div class="hud-row"><span class="hud-label">Eje X (Ancho):</span> <span class="hud-value" id="geo-x">0.00 mm</span></div>
        <div class="hud-row"><span class="hud-label">Eje Y (Largo):</span> <span class="hud-value" id="geo-y">0.00 mm</span></div>
        <div class="hud-row"><span class="hud-label">Eje Z (Alto):</span> <span class="hud-value" id="geo-z">0.00 mm</span></div>
        <div class="hud-row"><span class="hud-label">Polígonos:</span> <span class="hud-value highlight" id="geo-poly">0</span></div>
        <div class="hud-row"><span class="hud-label">Tiempo Render:</span> <span class="hud-value" id="geo-time">0 ms</span></div>
    </div>

    <div id="console" class="nexus-panel">
        <div class="log-sys">> Inicializando Worker Multi-hilo...</div>
        <div id="log-content"></div>
    </div>

    <div id="loader" style="display:none;">
        <div class="spinner"></div>
        <div id="loader-txt" style="color: #00E5FF; font-size: 11px; font-weight: bold;">WORKER PROCESANDO...</div>
    </div>

    <script type="module">
        // Importar VRButton dinámicamente como módulo para habilitar WebXR
        import { VRButton } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/webxr/VRButton.js';

        // --- FUNCIONES GLOBALES ENLAZADAS AL WINDOW (Por usar type="module") ---
        window.toggleAutoRotate = () => { controls.autoRotate = !controls.autoRotate; };
        window.changeMaterial = () => { if(currentMesh) { matIndex = (matIndex + 1) % materials.length; currentMesh.material = materials[matIndex]; } };
        window.toggleCamera = () => { camera.fov = camera.fov === 45 ? 10 : 45; camera.position.multiplyScalar(camera.fov === 10 ? 4 : 0.25); camera.updateProjectionMatrix(); };
        window.toggleConsole = () => { const c = document.getElementById('console'); c.style.display = c.style.display === 'none' || c.style.display === '' ? 'block' : 'none'; };
        window.exportFile = exportFile;

        // --- HW DETECT (APIs MODERNAS) ---
        document.getElementById('hw-cpu').innerText = (navigator.hardwareConcurrency || '?') + ' Cores';
        
        // Memoria RAM del dispositivo (Disponible en Chromium)
        if (navigator.deviceMemory) {
            document.getElementById('hw-ram').innerText = navigator.deviceMemory + ' GB+';
        }

        // Tipo de conexión de red
        if (navigator.connection && navigator.connection.effectiveType) {
            document.getElementById('hw-net').innerText = navigator.connection.effectiveType.toUpperCase();
        }

        // Estado de Batería
        if (navigator.getBattery) {
            navigator.getBattery().then(bat => {
                const updateBat = () => {
                    let level = Math.round(bat.level * 100);
                    let icon = bat.charging ? "⚡" : (level < 20 ? "🪫" : "🔋");
                    document.getElementById('hw-bat').innerText = `${level}% ${icon}`;
                };
                updateBat();
                bat.addEventListener('levelchange', updateBat);
                bat.addEventListener('chargingchange', updateBat);
            });
        }

        // Detección de GPU WebGL
        try {
            const gl = document.createElement('canvas').getContext('webgl');
            const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
            document.getElementById('hw-gpu').innerText = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL).split(',')[0].replace('ANGLE (', '').substring(0, 18);
        } catch (e) { document.getElementById('hw-gpu').innerText = "Bloqueado/Oculto"; }

        function log(msg) {
            const div = document.getElementById('log-content');
            div.innerHTML += `<div>${msg}</div>`; div.parentElement.scrollTop = div.parentElement.scrollHeight;
        }

        // --- 3D SCENE & VR ---
        let scene, camera, renderer, controls, currentMesh = null;
        let matIndex = 0;
        const materials = [
            new THREE.MeshStandardMaterial({ color: 0xFFAB00, roughness: 0.3, metalness: 0.9 }), // Dorado
            new THREE.MeshStandardMaterial({ color: 0x00E5FF, roughness: 0.2, metalness: 0.8 }), // Cyan Neón
            new THREE.MeshNormalMaterial(), // Normales
            new THREE.MeshBasicMaterial({ color: 0x00E676, wireframe: true }), // Wireframe Hacker
            new THREE.MeshStandardMaterial({ color: 0x1A1A1A, roughness: 0.8, metalness: 0.1 })  // Fibra Carbono / Mate
        ];

        function initWebGL() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene(); 
            
            // Suelo Grid (Actúa como plano de referencia en VR)
            const grid = new THREE.GridHelper(400, 80, 0x30363D, 0x161B22);
            grid.position.y = -0.5; // Un poco por debajo del cero para que las bases descansen encima
            scene.add(grid);

            // Iluminación optimizada para materiales físicos
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const dl = new THREE.DirectionalLight(0xffffff, 0.8); dl.position.set(50, 100, 50); scene.add(dl);
            const bl = new THREE.DirectionalLight(0xB388FF, 0.5); bl.position.set(-50, 50, -50); scene.add(bl); // Luz morada VR
            
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 2000); 
            camera.position.set(80, 50, 80);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); 
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            // Activar Realidad Virtual
            renderer.xr.enabled = true;
            document.body.appendChild( VRButton.createButton( renderer ) );

            container.appendChild(renderer.domElement);
            
            controls = new THREE.OrbitControls(camera, renderer.domElement); 
            controls.enableDamping = true;

            window.addEventListener('resize', () => { 
                camera.aspect = window.innerWidth / window.innerHeight; 
                camera.updateProjectionMatrix(); 
                renderer.setSize(window.innerWidth, window.innerHeight); 
            });
            
            // En VR se recomienda usar setAnimationLoop en lugar de requestAnimationFrame
            renderer.setAnimationLoop( function () {
                controls.update(); 
                renderer.render(scene, camera);
            });
        }

        // --- WORKER JS-CSG ---
        const workerCode = `
            importScripts('https://cdn.jsdelivr.net/gh/evanw/csg.js@master/csg.js');
            CSG.prototype.translate = function(v) { return this.transform(CSG.Matrix4x4.translation(v)); };
            CSG.prototype.scale = function(v) { if(typeof v === 'number') v = [v,v,v]; return this.transform(CSG.Matrix4x4.scaling(v)); };
            CSG.prototype.rotateX = function(deg) { return this.transform(CSG.Matrix4x4.rotationX(deg)); };
            CSG.prototype.rotateY = function(deg) { return this.transform(CSG.Matrix4x4.rotationY(deg)); };
            CSG.prototype.rotateZ = function(deg) { return this.transform(CSG.Matrix4x4.rotationZ(deg)); };
            self.onmessage = function(e) {
                try {
                    let fn = new Function(e.data + "\\nreturn main();");
                    let csgResult = fn();
                    if (!csgResult || typeof csgResult.toPolygons !== 'function') throw new Error("Objeto no válido o vacío");
                    let polys = csgResult.toPolygons(); let numTriangles = 0;
                    for(let i=0; i<polys.length; i++) numTriangles += (polys[i].vertices.length - 2);
                    let v = new Float32Array(numTriangles * 9); let n = new Float32Array(numTriangles * 9); let idx = 0;
                    for (let i = 0; i < polys.length; i++) {
                        let poly = polys[i];
                        for (let j = 2; j < poly.vertices.length; j++) {
                            let v0 = poly.vertices[0], v1 = poly.vertices[j - 1], v2 = poly.vertices[j];
                            v[idx]=v0.pos.x; v[idx+1]=v0.pos.y; v[idx+2]=v0.pos.z; n[idx]=v0.normal.x; n[idx+1]=v0.normal.y; n[idx+2]=v0.normal.z; idx+=3;
                            v[idx]=v1.pos.x; v[idx+1]=v1.pos.y; v[idx+2]=v1.pos.z; n[idx]=v1.normal.x; n[idx+1]=v1.normal.y; n[idx+2]=v1.normal.z; idx+=3;
                            v[idx]=v2.pos.x; v[idx+1]=v2.pos.y; v[idx+2]=v2.pos.z; n[idx]=v2.normal.x; n[idx+1]=v2.normal.y; n[idx+2]=v2.normal.z; idx+=3;
                        }
                    }
                    self.postMessage({ success: true, v: v, n: n }, [v.buffer, n.buffer]);
                } catch(err) { self.postMessage({ success: false, err: err.message }); }
            };
        `;
        const csgWorker = new Worker(URL.createObjectURL(new Blob([workerCode], {type: 'application/javascript'})));
        let t0 = 0;

        csgWorker.onmessage = function(e) {
            document.getElementById('loader').style.display = 'none'; const data = e.data;
            if(data.success) {
                const geom = new THREE.BufferGeometry();
                geom.setAttribute('position', new THREE.BufferAttribute(data.v, 3)); 
                geom.setAttribute('normal', new THREE.BufferAttribute(data.n, 3));
                geom.computeBoundingBox();
                
                if (currentMesh) { scene.remove(currentMesh); currentMesh.geometry.dispose(); }
                
                currentMesh = new THREE.Mesh(geom, materials[matIndex]);
                
                // Centrar malla para el visor normal y el VR
                const center = new THREE.Vector3(); 
                geom.boundingBox.getCenter(center);
                currentMesh.position.sub(center); 
                
                // Elevar un poco en Y para que no atraviese el grid base si es que es plano
                const size = new THREE.Vector3(); geom.boundingBox.getSize(size);
                currentMesh.position.y += size.y / 2;

                scene.add(currentMesh);
                
                document.getElementById('geo-x').innerText = size.x.toFixed(2) + " mm";
                document.getElementById('geo-y').innerText = size.y.toFixed(2) + " mm";
                document.getElementById('geo-z').innerText = size.z.toFixed(2) + " mm";
                document.getElementById('geo-poly').innerText = (data.v.length / 3).toString();
                document.getElementById('geo-time').innerText = Math.round(performance.now() - t0) + " ms";
            } else {
                log("<span class='log-err'>> WORKER ERROR: " + data.err + "</span>"); 
                document.getElementById('console').style.display = 'block';
            }
        };

        function executeCSGCode(rawCode) {
            document.getElementById('loader-txt').innerText = "WORKER PROCESANDO...";
            document.getElementById('loader').style.display = 'flex';
            t0 = performance.now(); csgWorker.postMessage(rawCode); 
        }

        // --- EXPORT AND NATIVE SAVE ---
        function exportFile(format) {
            if(!currentMesh) { log("<span class='log-err'>No hay geometría para exportar.</span>"); return; }
            document.getElementById('loader-txt').innerText = "GENERANDO " + format.toUpperCase() + "...";
            document.getElementById('loader').style.display = 'flex';
            
            setTimeout(() => {
                let dataString = ""; let ext = "";
                let pos = currentMesh.geometry.attributes.position.array;
                let nor = currentMesh.geometry.attributes.normal.array;

                if (format === 'stl') {
                    ext = ".stl"; dataString = "solid nexus_export\n";
                    for(let i=0; i<pos.length; i+=9) {
                        dataString += "facet normal "+nor[i]+" "+nor[i+1]+" "+nor[i+2]+"\n  outer loop\n";
                        dataString += "    vertex "+pos[i]+" "+pos[i+1]+" "+pos[i+2]+"\n    vertex "+pos[i+3]+" "+pos[i+4]+" "+pos[i+5]+"\n    vertex "+pos[i+6]+" "+pos[i+7]+" "+pos[i+8]+"\n  endloop\nendfacet\n";
                    }
                    dataString += "endsolid nexus_export\n";
                } else if (format === 'obj') {
                    ext = ".obj"; dataString = "# NEXUS CAD Export\n";
                    for(let i=0; i<pos.length; i+=3) dataString += "v " + pos[i] + " " + pos[i+1] + " " + pos[i+2] + "\n";
                    for(let i=0; i<nor.length; i+=3) dataString += "vn " + nor[i] + " " + nor[i+1] + " " + nor[i+2] + "\n";
                    for(let i=1; i<=(pos.length/3); i+=3) dataString += "f " + i + "//" + i + " " + (i+1) + "//" + (i+1) + " " + (i+2) + "//" + (i+2) + "\n";
                }

                let filename = "nexus_model_" + Math.floor(Date.now()/1000) + ext;
                
                fetch(window.location.origin + '/api/save_export', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filename: filename, data: dataString })
                })
                .then(r => r.json())
                .then(res => {
                    log("<span class='log-ok'>> ¡" + format.toUpperCase() + " GUARDADO EN EL DISPOSITIVO! Ve a la pestaña DB para descargarlo.</span>");
                    document.getElementById('console').style.display = 'block';
                    
                    try {
                        let blob = new Blob([dataString], {type: 'text/plain'});
                        let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click();
                    } catch(e) {}
                })
                .catch(err => log("<span class='log-err'>> Error de exportación: " + err + "</span>"))
                .finally(() => document.getElementById('loader').style.display = 'none');
            }, 100);
        }

        // --- POLLING LOCALHOST ---
        let lastCode = "";
        function checkServer() {
            fetch(window.location.origin + '/api/get_code_b64.json')
                .then(r => r.json())
                .then(data => {
                    if (data && data.code_b64 && data.code_b64 !== "") {
                        let decoded = atob(data.code_b64);
                        if (decoded !== lastCode) { lastCode = decoded; executeCSGCode(decoded); }
                    }
                }).catch(e => {});
        }
        
        window.onload = () => { 
            initWebGL(); 
            setInterval(checkServer, 1000); 
        };
    </script>
</body>
</html>
