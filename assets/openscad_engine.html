<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Motor CAD WASM</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #0a0a0a; overflow: hidden; font-family: monospace; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        #overlay {
            position: absolute; bottom: 10px; left: 10px;
            background: rgba(0, 255, 0, 0.1); border: 1px solid #00ff00;
            color: #00ff00; padding: 8px 12px; border-radius: 4px;
            font-size: 12px; pointer-events: none; text-shadow: 0 0 2px #000;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="overlay">Módulo 3D Táctil Inicializado. Esperando malla WASM real...</div>

    <script>
        // === CONFIGURACIÓN THREE.JS (VISOR 3D CAD AVANZADO) ===
        let scene, camera, renderer, controls, currentMesh;
        const container = document.getElementById('canvas-container');
        const overlay = document.getElementById('overlay');

        function initCAD() {
            // Escena y fondo oscuro
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);

            // Cámara en perspectiva CAD (45 grados)
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(50, 50, 50); // Vista isométrica inicial

            // Renderizador WebGL con antialiasing para que se vea nítido en el móvil
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            // Ajustar pixel ratio para pantallas retina/alto DPI
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // === CONTROLES TÁCTILES/RATÓN (OrbitControls) ===
            // ESTO SOLUCIONA EL VISOR ESTÁTICO DE IMAGE_3
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; // Efecto suavizado al soltar
            controls.dampingFactor = 0.1;

            // Iluminación CAD
            const ambientLight = new THREE.AmbientLight(0x404040, 1.5);
            scene.add(ambientLight);
            
            // Luces direccionales para dar volumen
            const dirLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight1.position.set(100, 100, 50).normalize();
            scene.add(dirLight1);
            
            const dirLight2 = new THREE.DirectionalLight(0x88bbff, 0.5); // Tono azulado de relleno
            dirLight2.position.set(-100, -100, -50).normalize();
            scene.add(dirLight2);

            // === CUADRÍCULA Y EJES CAD ===
            // Ayuda a ubicarse en el espacio 3D (como en OpenSCAD de escritorio)
            const gridHelper = new THREE.GridHelper(100, 50, 0x444444, 0x222222);
            scene.add(gridHelper);
            
            const axesHelper = new THREE.AxesHelper(20);
            scene.add(axesHelper);

            animate();
        }

        // Bucle de renderizado
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Necesario para el Damping de OrbitControls táctiles
            renderer.render(scene, camera);
        }

        // Manejar redimensionamiento (giro de pantalla del móvil)
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // === PUENTE DE COMUNICACIÓN CON PYTHON (FLET) ===
        // Esta función es llamada desde Python vía wasm_webview.run_javascript
        function processOpenScad(code) {
            overlay.innerHTML = "Compilando... <br><i>(Esperando motor WASM real)</i>";
            
            // --- AQUÍ VA LA INTEGRACIÓN REAL CON EL MOTOR WASM (ej. openscad-wasm) ---
            // Cuando tengamos la librería WASM, parsearemos el código, obtendremos los vértices y las caras
            // y construiremos la geometría Three.js.
            
            // SIMULADOR: Dependiendo del código, pintamos una geometría u otra para probar táctiles.
            // Si el código incluye "sphere", pintamos una esfera, si no, un cubo.
            
            // Limpiar malla anterior si existe
            if(currentMesh) {
                scene.remove(currentMesh);
                currentMesh.geometry.dispose();
                currentMesh.material.dispose();
            }

            let geometry;
            if (code.includes("sphere")) {
                geometry = new THREE.SphereGeometry(15, 32, 16);
                overlay.innerHTML = "Simulador WASM: Esfera generada.";
            } else if (code.includes("cylinder")) {
                geometry = new THREE.CylinderGeometry(10, 10, 20, 32);
                overlay.innerHTML = "Simulador WASM: Cilindro generado.";
            } else {
                geometry = new THREE.BoxGeometry(20, 20, 20);
                overlay.innerHTML = "Simulador WASM: Cubo generado.";
            }

            // Material CAD (Verde brillante con un poco de brillo)
            const material = new THREE.MeshPhongMaterial({ 
                color: 0x00e676, 
                specular: 0x111111,
                shininess: 30,
                flatShading: false
            });

            currentMesh = new THREE.Mesh(geometry, material);
            currentMesh.position.y = 10; // Levantar sobre la rejilla
            scene.add(currentMesh);
        }

        // Iniciar visor táctil al cargar
        initCAD();
    </script>
</body>
</html>
