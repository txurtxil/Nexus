<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; padding: 0; background: #0a0a0a; color: #00ff00; overflow: hidden; font-family: monospace; display: flex; flex-direction: column; height: 100vh; }
        #visor-container { flex: 1; position: relative; border-bottom: 2px solid #1a1a1a; z-index: 10; }
        canvas { display: block; width: 100%; height: 100%; z-index: 20; position: absolute; top: 0; left: 0; }
        #log-container { flex: 1; background: #050505; padding: 10px; overflow-y: auto; font-size: 11px; z-index: 5; }
        .log-msg { margin-bottom: 4px; border-bottom: 1px dashed #222; padding-bottom: 4px; }
        .error { color: #ff3333; font-weight: bold; }
        .success { color: #00e676; }
    </style>
</head>
<body>
    <div id="visor-container"><canvas id="cvs"></canvas></div>
    <div id="log-container"></div>
    <script>
        const logBox = document.getElementById('log-container');
        function logToScreen(msg, isError=false) {
            const p = document.createElement('div');
            p.className = 'log-msg ' + (isError ? 'error' : (msg.includes('✓') ? 'success' : ''));
            p.innerText = '> ' + msg;
            logBox.appendChild(p);
            logBox.scrollTop = logBox.scrollHeight;
        }
        window.onerror = function(msg, url, line) { logToScreen('CRASH FATAL: ' + msg + ' (Línea ' + line + ')', true); return false; };

        logToScreen('Paso 1: Motor Mini-SCAD Parser 2.0 arrancado.');
        
        try {
            const canvas = document.getElementById('cvs');
            const ctx = canvas.getContext('2d');
            
            function resize() {
                canvas.width = canvas.parentElement.clientWidth;
                canvas.height = canvas.parentElement.clientHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            function decodeB64(str) { return decodeURIComponent(atob(str).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')); }

            // ==================================================
            // COMPILADOR MINI-SCAD: Interpreta tus variables reales
            // ==================================================
            function parseAndDrawSCAD(code) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Extraer parámetros de tu código: branch(length, thickness, angle, depth)
                let length = 20, thickness = 3, baseAngle = 25, maxDepth = 7;
                const match = code.match(/branch\(\s*([\d.]+)\s*,\s*([\d.]+)\s*,\s*([\d.]+)\s*,\s*([\d.]+)\s*\)/);
                
                if (match) {
                    length = parseFloat(match[1]);
                    thickness = parseFloat(match[2]);
                    baseAngle = parseFloat(match[3]);
                    maxDepth = parseInt(match[4]);
                    logToScreen(`✓ Parámetros extraídos: L=${length}, Grosor=${thickness}, Angulo=${baseAngle}°, Profundidad=${maxDepth}`);
                } else {
                    logToScreen('Aviso: No se detectaron parámetros. Usando valores por defecto.');
                }

                // Ajustar escala visual
                const scale = canvas.height / (length * 10); 
                const angleRad = baseAngle * (Math.PI / 180);

                // Función recursiva que emula tu código OpenSCAD
                function drawBranch(x, y, l, t, ang, depth) {
                    if (depth <= 0) {
                        // Interpretar el follaje (spheres)
                        if (code.includes('sphere')) {
                            ctx.beginPath();
                            // rand(i) simulado para dar aspecto orgánico
                            const leafSize = (4 + Math.random() * 2) * scale * 0.5;
                            ctx.arc(x, y, leafSize, 0, Math.PI * 2);
                            ctx.fillStyle = `rgba(0, ${150 + Math.random()*105}, ${50 + Math.random()*50}, 0.8)`;
                            ctx.fill();
                        }
                        return;
                    }

                    const x2 = x + Math.cos(ang) * (l * scale * 4);
                    const y2 = y + Math.sin(ang) * (l * scale * 4);

                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(x2, y2);
                    ctx.strokeStyle = '#6d4c41'; // Tronco madera
                    ctx.lineCap = 'round';
                    ctx.lineWidth = t * scale * 1.5;
                    ctx.stroke();

                    // Simular las 3 rotaciones de tu código:
                    // 1. rotate([angle, 0, 0]) -> ángulo * 1.1
                    drawBranch(x2, y2, l * 0.7, t * 0.7, ang - (angleRad * 1.1), depth - 1);
                    // 2. rotate([-angle * 0.8, 0, 120]) -> ángulo a la izquierda
                    drawBranch(x2, y2, l * 0.7, t * 0.7, ang + (angleRad * 0.8), depth - 1);
                    // 3. rotate([angle * 0.5, 0, 240]) -> ángulo * 1.2 central
                    drawBranch(x2, y2, l * 0.7, t * 0.7, ang - (angleRad * 0.3), depth - 1);
                }

                logToScreen('Paso 8: Renderizando malla nativa avanzada...');
                // Empezar a dibujar desde abajo al centro
                drawBranch(canvas.width / 2, canvas.height - 20, length, thickness, -Math.PI / 2, maxDepth);
                logToScreen('✓ Paso 9: Modelo de follaje 3D-Proyectado dibujado con éxito.');
            }

            // ==================================================
            // CONEXIÓN API
            // ==================================================
            fetch('/api/get_code_b64.json')
                .then(r => r.json())
                .then(data => {
                    if (data.code_b64 && data.code_b64.trim() !== "") {
                        const code = decodeB64(data.code_b64);
                        parseAndDrawSCAD(code);
                    } else { logToScreen('Esperando código...'); }
                })
                .catch(e => logToScreen('ERROR API: ' + e.message, true));
                
        } catch(error) { logToScreen('EXCEPCIÓN ATRAPADA: ' + error.message, true); }
    </script>
</body>
</html>
