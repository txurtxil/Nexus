<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS CAD PRO - TITAN SPACE ENGINE & Híbrido STL</title>
    <style>
        :root { --nexus-cyan: #00E5FF; --nexus-green: #00E676; --nexus-purple: #B388FF; --nexus-bg: rgba(11, 14, 20, 0.85); --nexus-border: #30363D; }
        body { margin: 0; overflow: hidden; background-color: #030408; font-family: 'Segoe UI', sans-serif; color: #E6EDF3; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        .nexus-panel { position: absolute; background: var(--nexus-bg); border: 1px solid var(--nexus-border); border-radius: 6px; padding: 12px; z-index: 10; backdrop-filter: blur(8px); box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        
        #toolbar { top: 15px; left: 15px; display: flex; flex-direction: column; gap: 8px; width: 140px; }
        .btn { background: #21262D; border: 1px solid var(--nexus-border); color: #fff; padding: 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; text-transform: uppercase; text-align: left; display: flex; justify-content: space-between; transition: all 0.2s; }
        .btn:hover { background: #30363D; }
        .btn:active { transform: scale(0.95); }
        
        #hud-panel { bottom: 15px; right: 15px; width: 230px; font-size: 10px; border-top: 3px solid var(--nexus-cyan); }
        .hud-section-title { color: var(--nexus-cyan); font-weight: bold; text-transform: uppercase; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid var(--nexus-border); letter-spacing: 1px; }
        .hud-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .hud-label { color: #8B949E; }
        .hud-value { color: #fff; font-family: 'Courier New', monospace; text-align: right; }
        .hud-value.highlight { color: var(--nexus-green); font-weight: bold; }
        .hud-value.purple { color: var(--nexus-purple); font-weight: bold; }
        
        #console { top: 15px; right: 15px; width: 250px; max-height: 200px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 10px; display: none; border-top: 3px solid #FFAB00; }
        .log-sys { color: var(--nexus-cyan); } .log-ok { color: var(--nexus-green); } .log-err { color: #FF5252; } .log-warn { color: #FFAB00; }
        
        #loader { display: none; position: absolute; bottom: 15px; left: 15px; z-index: 20; background: var(--nexus-bg); padding: 10px 20px; border-radius: 6px; border-left: 3px solid var(--nexus-cyan); align-items: center; gap: 10px; }
        .spinner { border: 2px solid rgba(0, 229, 255, 0.2); border-top: 2px solid var(--nexus-cyan); border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #VRButton { border: 1px solid var(--nexus-purple) !important; background: rgba(22, 27, 34, 0.9) !important; color: var(--nexus-purple) !important; border-radius: 6px !important; font-weight: bold !important; font-family: 'Segoe UI', sans-serif !important; letter-spacing: 1px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
</head>
<body>

    <div id="canvas-container"></div>
    
    <div id="toolbar" class="nexus-panel">
        <button class="btn" style="border-left: 3px solid #00E676;" onclick="toggleAutoRotate()">Rotar <span>🔄</span></button>
        <button class="btn" style="border-left: 3px solid #6200EA;" onclick="toggleCamera()">Cámara <span>🎥</span></button>
        <button class="btn" style="border-left: 3px solid #FFAB00;" onclick="changeMaterial()">Pintura <span>🎨</span></button>
        <button class="btn" style="border-left: 3px solid #D50000;" onclick="exportFile('stl')">Guardar STL <span>🧊</span></button>
        <button class="btn" style="border-left: 3px solid #C51162;" onclick="exportFile('obj')">Guardar OBJ <span>📦</span></button>
        <button class="btn" style="border-left: 3px solid var(--nexus-purple);" onclick="triggerHDExport()">Guardar HD <span>💎</span></button>
        <button class="btn" style="border-left: 3px solid #00B0FF;" onclick="toggleConsole()">Motor Logs <span>🖥️</span></button>
    </div>

    <div id="hud-panel" class="nexus-panel">
        <div class="hud-section-title">🔌 Telemetría Cliente</div>
        <div class="hud-row"><span class="hud-label">Procesadores:</span> <span class="hud-value highlight" id="hw-cpu">-</span></div>
        <div class="hud-row"><span class="hud-label">Memoria RAM:</span> <span class="hud-value purple" id="hw-ram">N/A</span></div>
        <div class="hud-row"><span class="hud-label">GPU Render:</span> <span class="hud-value" id="hw-gpu">Buscando...</span></div>
        <div class="hud-row"><span class="hud-label">Batería:</span> <span class="hud-value" id="hw-bat">🔌 AC</span></div>
        <div class="hud-row"><span class="hud-label">Red / Conexión:</span> <span class="hud-value" id="hw-net">Local</span></div>
        <div style="height: 10px;"></div>
        <div class="hud-section-title">📐 Análisis de Geometría</div>
        <div class="hud-row"><span class="hud-label">Eje X (Ancho):</span> <span class="hud-value" id="geo-x">0.00 mm</span></div>
        <div class="hud-row"><span class="hud-label">Eje Y (Largo):</span> <span class="hud-value" id="geo-y">0.00 mm</span></div>
        <div class="hud-row"><span class="hud-label">Eje Z (Alto):</span> <span class="hud-value" id="geo-z">0.00 mm</span></div>
        <div class="hud-row"><span class="hud-label">Polígonos:</span> <span class="hud-value highlight" id="geo-poly">0</span></div>
        <div class="hud-row"><span class="hud-label">Tiempo Render:</span> <span class="hud-value" id="geo-time">0 ms</span></div>
    </div>

    <div id="console" class="nexus-panel">
        <div class="log-sys">> Inicializando Worker Multi-hilo HD...</div>
        <div id="log-content"></div>
    </div>

    <div id="loader" style="display:none;">
        <div class="spinner"></div>
        <div id="loader-txt" style="color: #00E5FF; font-size: 11px; font-weight: bold;">WORKER PROCESANDO...</div>
    </div>

    <script type="module">
        import { VRButton } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/webxr/VRButton.js';

        window.NEXUS_HD_EXPORT = false;
        window.IS_EXPORTING_HD = false;

        window.toggleAutoRotate = () => { controls.autoRotate = !controls.autoRotate; };
        
        let dynamicMat = null; 

        window.changeMaterial = () => { 
            if(currentMesh) { 
                matIndex = (matIndex + 1) % materials.length; 
                currentMesh.material = materials[matIndex]; 
            } 
        };
        
        window.toggleCamera = () => { camera.fov = camera.fov === 45 ? 10 : 45; camera.position.multiplyScalar(camera.fov === 10 ? 4 : 0.25); camera.updateProjectionMatrix(); };
        window.toggleConsole = () => { const c = document.getElementById('console'); c.style.display = c.style.display === 'none' || c.style.display === '' ? 'block' : 'none'; };
        window.exportFile = exportFile;

        window.triggerHDExport = () => {
            if(!lastCode) { log("<span class='log-err'>No hay geometría para exportar.</span>"); document.getElementById('console').style.display = 'block'; return; }
            window.IS_EXPORTING_HD = true;
            window.NEXUS_HD_EXPORT = true;
            executeCSGCode(lastCode); 
        };

        // HW DETECT
        document.getElementById('hw-cpu').innerText = (navigator.hardwareConcurrency || '?') + ' Cores';
        if (navigator.deviceMemory) document.getElementById('hw-ram').innerText = navigator.deviceMemory + ' GB+';
        if (navigator.connection && navigator.connection.effectiveType) document.getElementById('hw-net').innerText = navigator.connection.effectiveType.toUpperCase();
        
        if (navigator.getBattery) {
            navigator.getBattery().then(bat => {
                const updateBat = () => {
                    let level = Math.round(bat.level * 100);
                    let icon = bat.charging ? "⚡" : (level < 20 ? "🪫" : "🔋");
                    document.getElementById('hw-bat').innerText = `${level}% ${icon}`;
                };
                updateBat(); bat.addEventListener('levelchange', updateBat); bat.addEventListener('chargingchange', updateBat);
            });
        }

        try {
            const gl = document.createElement('canvas').getContext('webgl');
            const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
            document.getElementById('hw-gpu').innerText = gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL).split(',')[0].replace('ANGLE (', '').substring(0, 18);
        } catch (e) { document.getElementById('hw-gpu').innerText = "Bloqueado/Oculto"; }

        function log(msg) {
            const div = document.getElementById('log-content');
            div.innerHTML += `<div>${msg}</div>`; div.parentElement.scrollTop = div.parentElement.scrollHeight;
        }

        // --- 3D SCENE & SPACE ENGINE VR ---
        let scene, camera, renderer, controls, currentMesh = null;
        let matIndex = 0;
        const materials = [
            new THREE.MeshStandardMaterial({ color: 0x00E5FF, roughness: 0.2, metalness: 0.8 }), 
            new THREE.MeshStandardMaterial({ color: 0xFFAB00, roughness: 0.3, metalness: 0.9 }), 
            new THREE.MeshNormalMaterial(), 
            new THREE.MeshBasicMaterial({ color: 0x00E676, wireframe: true }), 
            new THREE.MeshStandardMaterial({ color: 0x1A1A1A, roughness: 0.8, metalness: 0.1 })  
        ];

        function initWebGL() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene(); 
            scene.background = new THREE.Color(0x020205); // Fondo Espacio Profundo
            
            // Rejilla de referencia (Movida hacia abajo para no molestar órbitas)
            const grid = new THREE.GridHelper(1000, 100, 0x161B22, 0x0B0E14); 
            grid.position.y = -50; 
            scene.add(grid);
            
            // SISTEMA DE ILUMINACIÓN TITAN
            const sunLight = new THREE.PointLight(0xffffee, 1.8, 2000); // Emisión desde el centro (El Sol)
            sunLight.position.set(0, 0, 0);
            scene.add(sunLight);
            
            const ambientLight = new THREE.AmbientLight(0x111122, 0.4); // Luz base tenue
            scene.add(ambientLight);

            // GENERADOR DE ESTRELLAS PROCEDURALES
            const starGeo = new THREE.BufferGeometry();
            const starMat = new THREE.PointsMaterial({color: 0xffffff, size: 0.8, sizeAttenuation: true});
            const starVerts = [];
            for(let i=0; i<3000; i++) {
                starVerts.push((Math.random()-0.5)*2000, (Math.random()-0.5)*2000, (Math.random()-0.5)*2000);
            }
            starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
            scene.add(new THREE.Points(starGeo, starMat));

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 5000); 
            camera.position.set(200, 100, 200);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); 
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true; document.body.appendChild( VRButton.createButton( renderer ) );
            container.appendChild(renderer.domElement);
            
            controls = new THREE.OrbitControls(camera, renderer.domElement); 
            controls.enableDamping = true;
            controls.target.set(0,0,0);
            
            window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
            renderer.setAnimationLoop( function () { controls.update(); renderer.render(scene, camera); });
        }

        // --- WORKER JS-CSG CON COLOR Y ARRAYS ---
        const workerCode = `
            importScripts('https://cdn.jsdelivr.net/gh/evanw/csg.js@master/csg.js');
            CSG.prototype.translate = function(v) { return this.transform(CSG.Matrix4x4.translation(v)); };
            CSG.prototype.scale = function(v) { if(typeof v === 'number') v = [v,v,v]; return this.transform(CSG.Matrix4x4.scaling(v)); };
            CSG.prototype.rotateX = function(deg) { return this.transform(CSG.Matrix4x4.rotationX(deg)); };
            CSG.prototype.rotateY = function(deg) { return this.transform(CSG.Matrix4x4.rotationY(deg)); };
            CSG.prototype.rotateZ = function(deg) { return this.transform(CSG.Matrix4x4.rotationZ(deg)); };
            
            // PARCHE DE COLOR SENIOR
            CSG.prototype.setColor = function(c) {
                this.toPolygons().forEach(function(p) {
                    p.shared = p.shared || {};
                    p.shared.color = c;
                });
                return this;
            };
            
            // PARCHE PARA SOPORTAR ARRAYS EN BOOLEANAS
            const origUnion = CSG.prototype.union;
            const origSubtract = CSG.prototype.subtract;
            const origIntersect = CSG.prototype.intersect;
            
            CSG.prototype.union = function(obj) {
                if(Array.isArray(obj)) { let r = this; for(let i=0; i<obj.length; i++) r = origUnion.call(r, obj[i]); return r; }
                return origUnion.call(this, obj);
            };
            CSG.prototype.subtract = function(obj) {
                if(Array.isArray(obj)) { let r = this; for(let i=0; i<obj.length; i++) r = origSubtract.call(r, obj[i]); return r; }
                return origSubtract.call(this, obj);
            };
            CSG.prototype.intersect = function(obj) {
                if(Array.isArray(obj)) { let r = this; for(let i=0; i<obj.length; i++) r = origIntersect.call(r, obj[i]); return r; }
                return origIntersect.call(this, obj);
            };

            let IMPORTED_STL = CSG.cube({radius:[0.01, 0.01, 0.01]});

            self.onmessage = function(e) {
                if (e.data.type === 'set_import') {
                    try {
                        let pos = e.data.positions; let polys = [];
                        for(let i=0; i<pos.length; i+=9) {
                            let v1 = new CSG.Vertex(new CSG.Vector(pos[i], pos[i+1], pos[i+2]), new CSG.Vector(0,0,1));
                            let v2 = new CSG.Vertex(new CSG.Vector(pos[i+3], pos[i+4], pos[i+5]), new CSG.Vector(0,0,1));
                            let v3 = new CSG.Vertex(new CSG.Vector(pos[i+6], pos[i+7], pos[i+8]), new CSG.Vector(0,0,1));
                            polys.push(new CSG.Polygon([v1, v2, v3])); 
                        }
                        IMPORTED_STL = CSG.fromPolygons(polys);
                        self.postMessage({ success: true, is_import: true });
                    } catch(err) {
                        self.postMessage({ success: false, is_import: true, err: err.message });
                    }
                } 
                else if (e.data.type === 'eval') {
                    try {
                        let fn = new Function("IMPORTED_STL", e.data.code + "\\nreturn main();");
                        let csgResult = fn(IMPORTED_STL);
                        if (!csgResult || typeof csgResult.toPolygons !== 'function') throw new Error("Objeto no válido o vacío");
                        
                        let polys = csgResult.toPolygons(); let numTriangles = 0;
                        for(let i=0; i<polys.length; i++) numTriangles += (polys[i].vertices.length - 2);
                        
                        let v = new Float32Array(numTriangles * 9); 
                        let n = new Float32Array(numTriangles * 9); 
                        let c = new Float32Array(numTriangles * 9); // Buffer de Color
                        let idx = 0;
                        
                        for (let i = 0; i < polys.length; i++) {
                            let poly = polys[i];
                            let norm = poly.plane.normal; 
                            let col = (poly.shared && poly.shared.color) ? poly.shared.color : [0.0, 0.89, 1.0]; // Cyan por defecto
                            
                            for (let j = 2; j < poly.vertices.length; j++) {
                                let v0 = poly.vertices[0], v1 = poly.vertices[j - 1], v2 = poly.vertices[j];
                                
                                v[idx]=v0.pos.x; v[idx+1]=v0.pos.y; v[idx+2]=v0.pos.z; 
                                n[idx]=norm.x; n[idx+1]=norm.y; n[idx+2]=norm.z; 
                                c[idx]=col[0]; c[idx+1]=col[1]; c[idx+2]=col[2]; 
                                idx+=3;
                                
                                v[idx]=v1.pos.x; v[idx+1]=v1.pos.y; v[idx+2]=v1.pos.z; 
                                n[idx]=norm.x; n[idx+1]=norm.y; n[idx+2]=norm.z; 
                                c[idx]=col[0]; c[idx+1]=col[1]; c[idx+2]=col[2]; 
                                idx+=3;
                                
                                v[idx]=v2.pos.x; v[idx+1]=v2.pos.y; v[idx+2]=v2.pos.z; 
                                n[idx]=norm.x; n[idx+1]=norm.y; n[idx+2]=norm.z; 
                                c[idx]=col[0]; c[idx+1]=col[1]; c[idx+2]=col[2]; 
                                idx+=3;
                            }
                        }
                        self.postMessage({ success: true, v: v, n: n, c: c }, [v.buffer, n.buffer, c.buffer]);
                    } catch(err) { self.postMessage({ success: false, err: err.message }); }
                }
            };
        `;
        const csgWorker = new Worker(URL.createObjectURL(new Blob([workerCode], {type: 'application/javascript'})));
        let t0 = 0;
        let isImportingSTL = false;

        csgWorker.onmessage = function(e) {
            const data = e.data;
            
            if (data.is_import) {
                isImportingSTL = false;
                if(data.success) {
                    log("<span class='log-ok'>> Módulo Híbrido: STL indexado listo.</span>");
                    if (lastCode !== "") executeCSGCode(lastCode); 
                } else {
                    log("<span class='log-err'>> ERROR (STL Import): " + data.err + "</span>"); document.getElementById('console').style.display = 'block';
                    document.getElementById('loader').style.display = 'none';
                }
                return;
            }

            document.getElementById('loader').style.display = 'none';
            if(data.success) {
                const geom = new THREE.BufferGeometry();
                geom.setAttribute('position', new THREE.BufferAttribute(data.v, 3)); 
                geom.setAttribute('normal', new THREE.BufferAttribute(data.n, 3));
                
                if (data.c) geom.setAttribute('color', new THREE.BufferAttribute(data.c, 3));
                
                geom.computeBoundingBox();
                
                if (currentMesh) { scene.remove(currentMesh); currentMesh.geometry.dispose(); }
                
                // MATERIAL TITAN MULTICOLOR
                dynamicMat = new THREE.MeshStandardMaterial({ 
                    vertexColors: !!data.c, 
                    roughness: 0.6, 
                    metalness: 0.1,
                    transparent: true,
                    opacity: 1.0,
                    side: THREE.DoubleSide
                });
                
                currentMesh = new THREE.Mesh(geom, dynamicMat);
                
                // ATENCIÓN: Eliminado el autocentrado y offset Y. Las coordenadas son 100% absolutas.
                // Esto permite que las piezas mantengan la posición exacta definida por el usuario.
                scene.add(currentMesh);
                
                const size = new THREE.Vector3(); geom.boundingBox.getSize(size);
                document.getElementById('geo-x').innerText = size.x.toFixed(2) + " mm";
                document.getElementById('geo-y').innerText = size.y.toFixed(2) + " mm";
                document.getElementById('geo-z').innerText = size.z.toFixed(2) + " mm";
                document.getElementById('geo-poly').innerText = (data.v.length / 3).toString();
                document.getElementById('geo-time').innerText = Math.round(performance.now() - t0) + " ms";

                if (window.IS_EXPORTING_HD) {
                    setTimeout(() => {
                        exportFile('stl');
                        window.IS_EXPORTING_HD = false;
                        window.NEXUS_HD_EXPORT = false;
                        log("<span class='log-ok'>> Exportación HD procesada. Volviendo a LOD base...</span>");
                        executeCSGCode(lastCode); 
                    }, 500);
                }

            } else {
                log("<span class='log-err'>> WORKER ERROR: " + data.err + "</span>"); 
                document.getElementById('console').style.display = 'block';
            }
        };

        function executeCSGCode(rawCode) {
            if (isImportingSTL) return; 
            
            let optimizedCode = rawCode;
            let currentSlices = window.NEXUS_HD_EXPORT ? 128 : 24;

            if (window.NEXUS_HD_EXPORT) {
                optimizedCode = optimizedCode.replace(/slices\s*:\s*\d+/g, 'slices: 128');
                document.getElementById('loader-txt').innerText = "RENDERIZANDO HD (128 SLICES)...";
                log("<span class='log-warn'>> 💎 Forzando renderizado en Alta Resolución...</span>");
            } else {
                optimizedCode = optimizedCode.replace(/slices\s*:\s*\d+/g, 'slices: 32');
                document.getElementById('loader-txt').innerText = "WORKER PROCESANDO...";
            }

            let filletHelper = "function roundedBox(w, d, h, r) {\n" +
                "var res = " + currentSlices + ";\n" +
                "w=Math.max(0.1,w); d=Math.max(0.1,d); h=Math.max(0.1,h); r=Math.min(r, w/2, d/2);\n" +
                "if(r<=0) return CSG.cube({radius:[w/2, d/2, h/2]});\n" +
                "var b1 = CSG.cube({radius:[w/2-r, d/2, h/2]});\n" +
                "var b2 = CSG.cube({radius:[w/2, d/2-r, h/2]});\n" +
                "var c1 = CSG.cylinder({start:[w/2-r, d/2-r, -h/2], end:[w/2-r, d/2-r, h/2], radius:r, slices:res});\n" +
                "var c2 = CSG.cylinder({start:[-w/2+r, d/2-r, -h/2], end:[-w/2+r, d/2-r, h/2], radius:r, slices:res});\n" +
                "var c3 = CSG.cylinder({start:[w/2-r, -d/2+r, -h/2], end:[w/2-r, -d/2+r, h/2], radius:r, slices:res});\n" +
                "var c4 = CSG.cylinder({start:[-w/2+r, -d/2+r, -h/2], end:[-w/2+r, -d/2+r, h/2], radius:r, slices:res});\n" +
                "return b1.union([b2, c1, c2, c3, c4]);\n" +
            "}\n\n";
            
            optimizedCode = filletHelper + optimizedCode;

            document.getElementById('loader').style.display = 'flex';
            t0 = performance.now(); 
            csgWorker.postMessage({ type: 'eval', code: optimizedCode }); 
        }

        function loadAndSendSTL(url) {
            isImportingSTL = true;
            document.getElementById('loader-txt').innerText = "DESCARGANDO STL LOCAL...";
            document.getElementById('loader').style.display = 'flex';
            
            const loader = new THREE.STLLoader();
            loader.load(url, function (geometry) {
                document.getElementById('loader-txt').innerText = "TRIANGULIZANDO A NODO CSG...";
                csgWorker.postMessage({ type: 'set_import', positions: geometry.attributes.position.array });
            }, undefined, function (error) {
                log("<span class='log-err'>> Error cargando STL Local: " + error + "</span>");
                isImportingSTL = false; document.getElementById('loader').style.display = 'none';
            });
        }

        function exportFile(format) {
            if(!currentMesh) { log("<span class='log-err'>No hay geometría para exportar.</span>"); return; }
            document.getElementById('loader-txt').innerText = "GENERANDO " + format.toUpperCase() + "...";
            document.getElementById('loader').style.display = 'flex';
            
            setTimeout(() => {
                let dataString = ""; let ext = "";
                let pos = currentMesh.geometry.attributes.position.array;
                let nor = currentMesh.geometry.attributes.normal.array;

                if (format === 'stl') {
                    ext = ".stl"; dataString = "solid nexus_export\n";
                    for(let i=0; i<pos.length; i+=9) {
                        dataString += "facet normal "+nor[i]+" "+nor[i+1]+" "+nor[i+2]+"\n  outer loop\n";
                        dataString += "    vertex "+pos[i]+" "+pos[i+1]+" "+pos[i+2]+"\n    vertex "+pos[i+3]+" "+pos[i+4]+" "+pos[i+5]+"\n    vertex "+pos[i+6]+" "+pos[i+7]+" "+pos[i+8]+"\n  endloop\nendfacet\n";
                    }
                    dataString += "endsolid nexus_export\n";
                } else if (format === 'obj') {
                    ext = ".obj"; dataString = "# NEXUS CAD Export\n";
                    for(let i=0; i<pos.length; i+=3) dataString += "v " + pos[i] + " " + pos[i+1] + " " + pos[i+2] + "\n";
                    for(let i=0; i<nor.length; i+=3) dataString += "vn " + nor[i] + " " + nor[i+1] + " " + nor[i+2] + "\n";
                    for(let i=1; i<=(pos.length/3); i+=3) dataString += "f " + i + "//" + i + " " + (i+1) + "//" + (i+1) + " " + (i+2) + "//" + (i+2) + "\n";
                }

                let filename = "nexus_model_" + Math.floor(Date.now()/1000) + ext;
                
                fetch(window.location.origin + '/api/save_export', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ filename: filename, data: dataString })
                }).then(r => r.json()).then(res => {
                    log("<span class='log-ok'>> ¡" + format.toUpperCase() + " GUARDADO EN LA PESTAÑA DB!</span>");
                    document.getElementById('console').style.display = 'block';
                    try {
                        let blob = new Blob([dataString], {type: 'text/plain'});
                        let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click();
                    } catch(e) {}
                }).catch(err => log("<span class='log-err'>> Error exportación: " + err + "</span>")).finally(() => document.getElementById('loader').style.display = 'none');
            }, 100);
        }

        // --- POLLING LOCALHOST ---
        let lastCode = "";
        let currentStlHash = "";

        function checkServer() {
            fetch(window.location.origin + '/api/get_code_b64.json')
                .then(r => r.json())
                .then(data => {
                    if (data.stl_hash && data.stl_hash !== currentStlHash) {
                        currentStlHash = data.stl_hash;
                        log("<span class='log-warn'>> Nuevo STL detectado, iniciando flujo híbrido...</span>");
                        document.getElementById('console').style.display = 'block';
                        loadAndSendSTL(window.location.origin + '/exports/imported.stl?t=' + Date.now());
                    }

                    if (data && data.code_b64 && data.code_b64 !== "") {
                        let decoded = atob(data.code_b64);
                        if (decoded !== lastCode) { 
                            lastCode = decoded; 
                            if (!isImportingSTL) executeCSGCode(lastCode); 
                        }
                    }
                }).catch(e => {});
        }
        
        window.onload = () => { initWebGL(); setInterval(checkServer, 1000); };
    </script>
</body>
</html>
