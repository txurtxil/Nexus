<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Motor CAD WASM</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        body { margin: 0; padding: 0; background-color: #0a0a0a; overflow: hidden; font-family: monospace; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        
        /* Panel de Estado Táctil Avanzado */
        #overlay {
            position: absolute; bottom: 10px; left: 10px;
            background: rgba(0, 0, 0, 0.7); border: 1px solid #333;
            color: #00ff00; padding: 8px 12px; border_radius: 6px;
            font-size: 12px; pointer-events: none; text-shadow: 0 0 2px #000;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="overlay">Cargando Three.js...</div>

    <script>
        // === CONFIGURACIÓN THREE.JS (VISOR 3D CAD) ===
        let scene, camera, renderer, controls, currentMesh;
        const container = document.getElementById('canvas-container');
        const overlay = document.getElementById('overlay');

        function initCAD() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a); // Fondo oscuro CAD

            // === FIX CRÍTICO: CÁMARA CAD CORREGIDA ===
            // image_10.png/image_11.png demostraban que la cámara estaba mal.
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            // Posicionar cámara para vista isométrica CAD inicial
            camera.position.set(50, 50, 50); 
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            // Ajustar pixel ratio para pantallas de alto DPI nativas de Android
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // Controles Táctiles/Ratón (OrbitControls)
            // image_3.png demostraba OrbitControls en negro. Funciona táctil obligatoriamente.
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; // Efecto suavizado al soltar
            controls.dampingFactor = 0.1;
            
            // Apuntar cámara al centro de geometría simulada (0,0,0)
            controls.target.set(0, 0, 0); 

            // Iluminación
            const ambientLight = new THREE.AmbientLight(0x404040, 1.5);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(100, 100, 50).normalize();
            scene.add(dirLight);

            // Rejilla y Ejes approved by CAD standards
            const gridHelper = new THREE.GridHelper(100, 50, 0x333333, 0x111111);
            scene.add(gridHelper);
            const axesHelper = new THREE.AxesHelper(20);
            scene.add(axesHelper);

            animate();
            
            // FASE FINAL: Three.js cargado, ahora implementamos el Handshake
            overlay.innerHTML = "Three.js Listo. Esperando Malla...";
            onViewerReady();
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Necesario para el Damping de OrbitControls táctiles
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // === FASE 1: PUENTE DE HANDSHAKE (Visor -> Python) ===
        // Esta función se llama cuando Three.js está completamente listo táctilmente.
        function onViewerReady() {
            // === ENVÍO DE SEÑAL A FLET ===
            // Esta es la forma técnica de enviar datos desde JS de WebView a Python en Flet.
            if (window.fletwebview) {
                window.fletwebview.postMessage("viewer_ready");
            }
        }

        // === FASE 2: RECEPCIÓN DE DATOS (run_javascriptconfirmed by image_11.png) ===
        // Esta función es llamada desde Python SOLO cuando Flet recibe el 'viewer_ready'
        function processOpenScad(code) {
            overlay.innerHTML = "Generando malla para: " + code.substring(0, 15) + "...";
            console.log("Generando código OpenSCAD:", code);
            
            // --- AQUÍ IRÍA LA INTEGRACIÓN REAL CON EL MOTOR WASM (ej. openscad-wasm) ---
            // Por ahora, simulamos que el motor WASM está listo inmediatamente.
            // Dependiendo del código, pintamos una geometría Three.js simulada táctil obligatoria.
            
            // Limpiar malla anterior si existe
            if(currentMesh) {
                scene.remove(currentMesh);
                currentMesh.geometry.dispose();
                currentMesh.material.dispose();
            }

            // SIMULADOR: Dependiendo del código, pintamos una geometría u otra obligatoria tactics.
            let geometry;
            if (code.toLowerCase().includes("sphere")) {
                geometry = new THREE.SphereGeometry(15, 32, 16);
            } else if (code.toLowerCase().includes("cylinder")) {
                geometry = new THREE.CylinderGeometry(10, 10, 20, 32);
            } else {
                geometry = new THREE.BoxGeometry(20, 20, 20); // Cubo CAD Tactics
            }

            // Material Tactics approved Tactics
            const material = new THREE.MeshPhongMaterial({ 
                color: 0x00e676, 
                specular: 0x111111,
                shininess: 30,
                flatShading: false
            });

            currentMesh = new THREE.Mesh(geometry, material);
            currentMesh.position.y = 10; // Levantar sobre la rejilla approved
            scene.add(currentMesh);
        }

        // Iniciar visor al cargar obligatory
        initCAD();
    </script>
</body>
</html>
