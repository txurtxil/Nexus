<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; padding: 0; background: #0a0a0a; color: #00ff00; overflow: hidden; font-family: monospace; display: flex; flex-direction: column; height: 100vh; }
        #visor-container { flex: 1; position: relative; border-bottom: 2px solid #1a1a1a; z-index: 10; }
        canvas { display: block; width: 100%; height: 100%; z-index: 20; position: absolute; top: 0; left: 0; }
        #log-container { flex: 1; background: #050505; padding: 10px; overflow-y: auto; font-size: 11px; z-index: 5; }
        .log-msg { margin-bottom: 4px; border-bottom: 1px dashed #222; padding-bottom: 4px; }
        .error { color: #ff3333; font-weight: bold; }
        .success { color: #00e676; }
    </style>
</head>
<body>
    <div id="visor-container"><canvas id="cvs"></canvas></div>
    <div id="log-container"></div>
    <script>
        const logBox = document.getElementById('log-container');
        function logToScreen(msg, isError=false) {
            const p = document.createElement('div');
            p.className = 'log-msg ' + (isError ? 'error' : (msg.includes('✓') ? 'success' : ''));
            p.innerText = '> ' + msg;
            logBox.appendChild(p);
            logBox.scrollTop = logBox.scrollHeight;
        }
        window.onerror = function(msg, url, line) { logToScreen('CRASH FATAL: ' + msg + ' (Línea ' + line + ')', true); return false; };

        logToScreen('Paso 1: Motor Mini-SCAD Parser 2.0 arrancado.');
        
        try {
            const canvas = document.getElementById('cvs');
            const ctx = canvas.getContext('2d');
            
            function resize() {
                canvas.width = canvas.parentElement.clientWidth;
                canvas.height = canvas.parentElement.clientHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            function decodeB64(str) { return decodeURIComponent(atob(str).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')); }

            // ==================================================
            // COMPILADOR MINI-SCAD: Interpreta tu código real
            // ==================================================
            function parseAndDrawSCAD(code) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // 1. Extraer tus parámetros reales de branch(...)
                let length = 20, thickness = 3, baseAngle = 25, maxDepth = 7;
                // Buscar branch(20, 3, 25, 7) en el código
                const match = code.match(/branch\(\s*([\d.]+)\s*,\s*([\d.]+)\s*,\s*([\d.]+)\s*,\s*([\d.]+)\s*\)/);
                
                if (match) {
                    length = parseFloat(match[1]);
                    thickness = parseFloat(match[2]);
                    baseAngle = parseFloat(match[3]);
                    maxDepth = parseInt(match[4]);
                    logToScreen(`✓ Matemáticas extraídas: L=${length}, Grosor=${thickness}, Angulo=${baseAngle}°, Nivel=${maxDepth}`);
                } else {
                    logToScreen('Aviso: Variables no detectadas. Usando modelo por defecto.');
                }

                // Ajustar escala visual a la pantalla del móvil
                const scale = (canvas.height * 0.6) / (length * 4); 
                const angleRad = baseAngle * (Math.PI / 180);

                // 2. Función recursiva que emula tus cilindros y rotaciones
                function drawBranch(x, y, l, t, ang, depth) {
                    if (depth <= 0) {
                        return; // Fin de la rama
                    }

                    // Calcular siguiente punto (translación)
                    const x2 = x + Math.cos(ang) * (l * scale);
                    const y2 = y + Math.sin(ang) * (l * scale);

                    // Dibujar el cilindro (como línea gruesa)
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(x2, y2);
                    ctx.strokeStyle = '#8d6e63'; // Color madera
                    ctx.lineCap = 'round';
                    ctx.lineWidth = t * scale * 0.5;
                    ctx.stroke();

                    // Simular tus 3 ramas de OpenSCAD:
                    // rotate([angle, 0, 0]) branch(length * 0.7, thickness * 0.7, angle * 1.1, depth - 1);
                    drawBranch(x2, y2, l * 0.7, t * 0.7, ang - (angleRad * 1.1), depth - 1);
                    
                    // rotate([-angle * 0.8, 0, 120]) branch(...)
                    drawBranch(x2, y2, l * 0.7, t * 0.7, ang + (angleRad * 0.8), depth - 1);
                    
                    // rotate([angle * 0.5, 0, 240]) branch(...)
                    drawBranch(x2, y2, l * 0.7, t * 0.7, ang - (angleRad * 0.5), depth - 1);
                }

                // 3. Función para dibujar tu follaje (esferas)
                function drawFoliage(x, y) {
                    if (code.includes('sphere')) {
                        // Bucle for(i=[0:5:360]) emulado
                        for (let i = 0; i < 360; i += 15) {
                            const radius = (4 + Math.random() * 2) * scale * 0.4;
                            const offsetX = (Math.random() - 0.5) * 40 * scale;
                            const offsetY = (Math.random() - 0.5) * 40 * scale;
                            
                            ctx.beginPath();
                            ctx.arc(x + offsetX, y - (15 * scale) + offsetY, radius, 0, Math.PI * 2);
                            ctx.fillStyle = `rgba(0, ${150 + Math.random()*100}, ${50 + Math.random()*50}, 0.6)`;
                            ctx.fill();
                        }
                        logToScreen('✓ Follaje de esferas renderizado.');
                    }
                }

                logToScreen('Paso 8: Procesando geometría dinámica...');
                
                // Iniciar el tronco desde la parte inferior central
                const startX = canvas.width / 2;
                const startY = canvas.height - 30;
                drawBranch(startX, startY, length, thickness, -Math.PI / 2, maxDepth);
                
                // Añadir el follaje en la copa del árbol (aproximado a tu translate)
                drawFoliage(startX, startY - (length * scale * 3.5));
                
                logToScreen('✓ Paso 9: Árbol complejo proyectado en pantalla con éxito.');
            }

            // ==================================================
            // CONEXIÓN API AL SERVIDOR PYTHON DE LA V1.0 RC01
            // ==================================================
            fetch('/api/get_code_b64.json')
                .then(r => r.json())
                .then(data => {
                    if (data.code_b64 && data.code_b64.trim() !== "") {
                        logToScreen('✓ Paso 6: Código recibido. Compilando...');
                        const code = decodeB64(data.code_b64);
                        parseAndDrawSCAD(code);
                    } else { logToScreen('Esperando código...'); }
                })
                .catch(e => logToScreen('ERROR API: ' + e.message, true));
                
        } catch(error) { logToScreen('EXCEPCIÓN ATRAPADA: ' + error.message, true); }
    </script>
</body>
</html>
