<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS CAD PRO - Motor Web Worker & Híbrido STL</title>
    <style>
        :root { --nexus-cyan: #00E5FF; --nexus-green: #00E676; --nexus-purple: #B388FF; --nexus-bg: rgba(11, 14, 20, 0.85); --nexus-border: #30363D; }
        body { margin: 0; overflow: hidden; background-color: #0B0E14; font-family: 'Segoe UI', sans-serif; color: #E6EDF3; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        .nexus-panel { position: absolute; background: var(--nexus-bg); border: 1px solid var(--nexus-border); border-radius: 6px; padding: 12px; z-index: 10; backdrop-filter: blur(8px); box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        
        #toolbar { top: 15px; left: 15px; display: flex; flex-direction: column; gap: 8px; }
        #toolbar button { background: #161B22; color: var(--nexus-cyan); border: 1px solid var(--nexus-cyan); padding: 8px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.2s; }
        #toolbar button:active { background: var(--nexus-cyan); color: #000; }
        
        #console { bottom: 15px; left: 15px; width: 350px; max-height: 150px; overflow-y: auto; font-family: monospace; font-size: 11px; display: none; }
        .log-error { color: #FF5252; } .log-success { color: var(--nexus-green); } .log-warn { color: #FFD54F; }
        
        #loader { bottom: 15px; right: 15px; display: none; font-weight: bold; color: var(--nexus-cyan); border-color: var(--nexus-cyan); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(0, 229, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0); } }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/exporters/STLExporter.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="toolbar" class="nexus-panel">
        <button onclick="exportSTL()">💾 Descargar STL (Pantalla)</button>
        <button onclick="triggerHDExport()" style="background: var(--nexus-purple); color: #000; border: none;">💎 Exportar STL (HD)</button>
        <button onclick="document.getElementById('console').style.display='none'">🧹 Limpiar Log</button>
    </div>
    
    <div id="console" class="nexus-panel"></div>
    <div id="loader" class="nexus-panel">⚙️ Compilando Malla...</div>

    <script>
        function log(msg) {
            const c = document.getElementById('console');
            c.style.display = 'block';
            c.innerHTML += `<div>${msg}</div>`;
            c.scrollTop = c.scrollHeight;
        }

        // --- VARIABLES GLOBALES ---
        let scene, camera, renderer, controls, currentMesh;
        let importedSTLPolygons = null;
        let isImportingSTL = false;

        // --- VARIABLES AÑADIDAS PARA HD EXPORT ---
        window.NEXUS_HD_EXPORT = false;
        window.IS_EXPORTING_HD = false;

        // --- INICIALIZACIÓN THREE.JS ---
        function initWebGL() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0B0E14);
            
            const gridHelper = new THREE.GridHelper(200, 50, 0x30363D, 0x161B22);
            gridHelper.position.y = -0.1;
            scene.add(gridHelper);
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(50, 200, 100);
            scene.add(dirLight);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.set(50, 50, 50);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.1;

            animate();
        }

        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }

        // --- DEFINICIÓN DEL WEB WORKER (CSG ASÍNCRONO) ---
        const workerCode = `
            importScripts('https://cdn.jsdelivr.net/npm/@jscad/csg@0.7.1/csg.js');
            
            const UTILS = {
                trans: function(obj, coords) { return obj.translate(coords); },
                rot: function(obj, angles) { return obj.rotateX(angles[0]).rotateY(angles[1]).rotateZ(angles[2]); },
                scale: function(obj, s) { 
                    if(Array.isArray(s)) return obj.scale(s);
                    return obj.scale([s,s,s]);
                }
            };

            let IMPORTED_STL = null;

            self.onmessage = function(e) {
                if(e.data.type === 'load_stl') {
                    IMPORTED_STL = e.data.polygons;
                    self.postMessage({status: 'stl_loaded'});
                    return;
                }

                if(e.data.type === 'process_csg') {
                    try {
                        const startTime = Date.now();
                        const func = new Function('CSG', 'UTILS', 'IMPORTED_STL', e.data.code + "\\nreturn main();");
                        const resultCSG = func(CSG, UTILS, IMPORTED_STL);
                        
                        if (!resultCSG || !resultCSG.polygons) throw new Error("La función main() no retornó un objeto CSG válido.");

                        const positions = []; const normals = [];
                        resultCSG.polygons.forEach(p => {
                            for (let i = 2; i < p.vertices.length; i++) {
                                let v0 = p.vertices[0].pos, v1 = p.vertices[i-1].pos, v2 = p.vertices[i].pos;
                                let n0 = p.vertices[0].normal, n1 = p.vertices[i-1].normal, n2 = p.vertices[i].normal;
                                
                                positions.push(v0.x, v0.y, v0.z, v1.x, v1.y, v1.z, v2.x, v2.y, v2.z);
                                if(n0 && n1 && n2) normals.push(n0.x, n0.y, n0.z, n1.x, n1.y, n1.z, n2.x, n2.y, n2.z);
                            }
                        });

                        self.postMessage({ status: 'success', positions: new Float32Array(positions), normals: new Float32Array(normals), time: Date.now() - startTime }, [new Float32Array(positions).buffer, new Float32Array(normals).buffer]);
                    } catch (error) {
                        self.postMessage({ status: 'error', message: error.toString() });
                    }
                }
            };
        `;

        const blob = new Blob([workerCode], { type: 'application/javascript' });
        const worker = new Worker(URL.createObjectURL(blob));

        worker.onmessage = function(e) {
            if (e.data.status === 'stl_loaded') {
                log("<span class='log-success'>✓ STL transferido al Worker. Compilando híbrido...</span>");
                isImportingSTL = false;
                executeCSGCode(lastCode); 
            }
            else if (e.data.status === 'success') {
                if (currentMesh) scene.remove(currentMesh);

                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.BufferAttribute(e.data.positions, 3));
                if (e.data.normals.length > 0) geometry.setAttribute('normal', new THREE.BufferAttribute(e.data.normals, 3));
                else geometry.computeVertexNormals();

                const material = new THREE.MeshStandardMaterial({ 
                    color: 0x00E5FF, roughness: 0.4, metalness: 0.1,
                    side: THREE.DoubleSide, polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1
                });

                currentMesh = new THREE.Mesh(geometry, material);
                
                const edges = new THREE.EdgesGeometry(geometry);
                const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 }));
                currentMesh.add(line);

                scene.add(currentMesh);
                log("<span class='log-success'>✓ Malla generada en " + e.data.time + "ms</span>");
                document.getElementById('loader').style.display = 'none';

                // --- GANCHO AÑADIDO: EXPORTACIÓN HD ---
                if (window.IS_EXPORTING_HD) {
                    setTimeout(() => {
                        exportSTL();
                        window.IS_EXPORTING_HD = false;
                        window.NEXUS_HD_EXPORT = false;
                        log("<span class='log-success'>> Guardado HD Completado. Restaurando LOD...</span>");
                        executeCSGCode(lastCode); 
                    }, 500);
                }

            } else {
                log("<span class='log-error'>❌ ERROR: " + e.data.message + "</span>");
                // Aseguramos que el loader se oculte si el código del usuario tiene un error
                document.getElementById('loader').style.display = 'none';
            }
        };

        // --- SISTEMA ORIGINAL COMPLEMENTADO CON INYECCIÓN ---
        function executeCSGCode(rawCode) {
            if (!rawCode) return;
            document.getElementById('loader').style.display = 'block';
            
            let optimizedCode = rawCode;
            let currentSlices = window.NEXUS_HD_EXPORT ? 128 : 24;

            if (window.NEXUS_HD_EXPORT) {
                optimizedCode = optimizedCode.replace(/slices\s*:\s*\d+/g, 'slices: 128');
                log("<span class='log-warn'>> 💎 Renderizando HD (128 slices)...</span>");
            } else {
                optimizedCode = optimizedCode.replace(/slices\s*:\s*\d+/g, 'slices: 24');
            }

            // Inyección segura en texto plano para evitar que el Worker falle al parsear
            let filletHelper = "\nfunction roundedBox(w, d, h, r) {\n" +
                "var res = " + currentSlices + ";\n" +
                "w=Math.max(0.1,w); d=Math.max(0.1,d); h=Math.max(0.1,h); r=Math.min(r, w/2, d/2);\n" +
                "if(r<=0) return CSG.cube({radius:[w/2, d/2, h/2]});\n" +
                "var b1 = CSG.cube({radius:[w/2-r, d/2, h/2]});\n" +
                "var b2 = CSG.cube({radius:[w/2, d/2-r, h/2]});\n" +
                "var c1 = CSG.cylinder({start:[w/2-r, d/2-r, -h/2], end:[w/2-r, d/2-r, h/2], radius:r, slices:res});\n" +
                "var c2 = CSG.cylinder({start:[-w/2+r, d/2-r, -h/2], end:[-w/2+r, d/2-r, h/2], radius:r, slices:res});\n" +
                "var c3 = CSG.cylinder({start:[w/2-r, -d/2+r, -h/2], end:[w/2-r, -d/2+r, h/2], radius:r, slices:res});\n" +
                "var c4 = CSG.cylinder({start:[-w/2+r, -d/2+r, -h/2], end:[-w/2+r, -d/2+r, h/2], radius:r, slices:res});\n" +
                "return b1.union([b2, c1, c2, c3, c4]);\n" +
            "}\n";
            
            optimizedCode = optimizedCode.replace("function main() {", "function main() {" + filletHelper);

            worker.postMessage({ type: 'process_csg', code: optimizedCode });
        }

        // --- FUNCIÓN AÑADIDA PARA ACTIVAR HD ---
        function triggerHDExport() {
            if(!lastCode) { alert("No hay geometría para exportar."); return; }
            window.IS_EXPORTING_HD = true;
            window.NEXUS_HD_EXPORT = true;
            executeCSGCode(lastCode); 
        }

        // --- FUNCIONES ORIGINALES INTACTAS ---
        function exportSTL() {
            if (!currentMesh) { alert("No hay malla para exportar"); return; }
            const exporter = new THREE.STLExporter();
            const stlString = exporter.parse(scene);
            const blob = new Blob([stlString], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'nexus_part_' + Date.now() + '.stl';
            link.click();
            URL.revokeObjectURL(url);
        }

        function loadAndSendSTL(url) {
            isImportingSTL = true;
            document.getElementById('loader').style.display = 'block';
            log(">> Descargando STL inyectado...");
            
            const loader = new THREE.STLLoader();
            loader.load(url, function (geometry) {
                log(">> STL cargado. Convirtiendo a polígonos CSG...");
                const pos = geometry.attributes.position.array;
                const polygons = [];
                
                for(let i=0; i<pos.length; i+=9) {
                    polygons.push({
                        vertices: [
                            {pos: {x: pos[i], y: pos[i+1], z: pos[i+2]}},
                            {pos: {x: pos[i+3], y: pos[i+4], z: pos[i+5]}},
                            {pos: {x: pos[i+6], y: pos[i+7], z: pos[i+8]}}
                        ]
                    });
                }
                
                log(">> Enviando " + polygons.length + " polígonos al Worker...");
                worker.postMessage({ type: 'load_stl', polygons: polygons });

            }, undefined, function (error) {
                log("<span class='log-error'>❌ Error al cargar STL: " + error + "</span>");
                isImportingSTL = false;
                document.getElementById('loader').style.display = 'none';
            });
        }

        // --- POLLING LOCALHOST ---
        let lastCode = "";
        let currentStlHash = "";

        function checkServer() {
            fetch(window.location.origin + '/api/get_code_b64.json')
                .then(r => r.json())
                .then(data => {
                    if (data.stl_hash && data.stl_hash !== currentStlHash) {
                        currentStlHash = data.stl_hash;
                        log("<span class='log-warn'>> Nuevo STL detectado, iniciando flujo híbrido...</span>");
                        document.getElementById('console').style.display = 'block';
                        loadAndSendSTL(window.location.origin + '/exports/imported.stl?t=' + Date.now());
                    }

                    if (data && data.code_b64 && data.code_b64 !== "") {
                        let decoded = atob(data.code_b64);
                        if (decoded !== lastCode) { 
                            lastCode = decoded; 
                            if (!isImportingSTL) executeCSGCode(lastCode); 
                        }
                    }
                }).catch(e => {});
        }
        
        window.onload = () => { initWebGL(); setInterval(checkServer, 1000); };
    </script>
</body>
</html>
