<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; padding: 0; background: #050505; color: #00ff00; overflow: hidden; font-family: monospace; display: flex; flex-direction: column; height: 100vh; touch-action: none; }
        #visor-container { flex: 1; position: relative; border-bottom: 2px solid #1a1a1a; z-index: 10; cursor: grab; }
        canvas { display: block; width: 100%; height: 100%; }
        
        #overlay-ui { position: absolute; top: 10px; left: 10px; z-index: 30; background: rgba(0,0,0,0.8); padding: 8px; border-radius: 8px; border: 1px solid #444; display: flex; flex-wrap: wrap; gap: 4px; max-width: 95%; }
        button { background: #0044cc; color: white; border: none; padding: 6px 8px; border-radius: 4px; font-weight: bold; font-size: 10px; }
        .btn-active { background: #00c853 !important; }
        .btn-danger { background: #d81b60; }
        
        #stats-ui { position: absolute; bottom: 10px; left: 10px; z-index: 30; font-size: 10px; color: #00ff00; background: rgba(0,0,0,0.6); padding: 5px; border-radius: 4px; }
        #bbox-info { position: absolute; bottom: 10px; right: 10px; z-index: 30; background: rgba(0,255,100,0.1); border: 1px solid #00ff00; color: #00ff00; padding: 5px; border-radius: 4px; font-size: 10px; }
    </style>
    <script src="three.min.js"></script>
    <script src="csg.js"></script>
</head>
<body>
    <div id="visor-container">
        <div id="overlay-ui">
            <button onclick="toggleRotate()" id="btn-rot">🔄 Giro: ON</button>
            <button onclick="toggleGrid()" id="btn-grid">🏁 Rejilla</button>
            <button onclick="cycleMaterial()">🎨 Material</button>
            <button onclick="toggleCamera()">🎥 Persp/Orto</button>
            <button onclick="resetCamera()">🎯 Reset</button>
            <button class="btn-danger" onclick="exportSTL()">⬇️ STL</button>
        </div>
        <div id="stats-ui">Polígonos: <span id="poly-count">0</span></div>
        <div id="bbox-info">Dimensiones: ---</div>
        <canvas id="cvs"></canvas>
    </div>
    
    <script>
        let autoRotate = true, showGrid = true;
        const canvas = document.getElementById('cvs');
        const renderer = new THREE.WebGLRenderer({canvas, antialias: true, alpha: true});
        const scene = new THREE.Scene();
        
        let aspect = window.innerWidth / (window.innerHeight*0.8);
        let camRadius = 150; let d = 100;
        const cameraP = new THREE.PerspectiveCamera(45, aspect, 0.1, 2000);
        const cameraO = new THREE.OrthographicCamera(-d*aspect, d*aspect, d, -d, 0.1, 2000);
        let activeCam = cameraP;

        // Iluminación Técnica
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const light = new THREE.DirectionalLight(0xffffff, 1); light.position.set(100, 200, 100); scene.add(light);
        const light2 = new THREE.PointLight(0x00ff00, 0.5); light2.position.set(-100, -100, -100); scene.add(light2);

        const grid = new THREE.GridHelper(400, 40, 0x00ff00, 0x112211); scene.add(grid);
        const axes = new THREE.AxesHelper(50); scene.add(axes);

        const materials = [
            new THREE.MeshStandardMaterial({color: 0x00ff7f, metalness: 0.2, roughness: 0.4}),
            new THREE.MeshStandardMaterial({color: 0x888888, metalness: 0.9, roughness: 0.2}),
            new THREE.MeshStandardMaterial({color: 0x00aaff, transparent: true, opacity: 0.4}),
            new THREE.MeshBasicMaterial({color: 0x00ff00, wireframe: true})
        ];
        let matIdx = 0; let mainMesh = null; let currentCSG = null;

        function toggleRotate() { autoRotate = !autoRotate; document.getElementById('btn-rot').innerText = autoRotate ? "🔄 Giro: ON" : "🔄 Giro: OFF"; }
        function toggleGrid() { showGrid = !showGrid; grid.visible = showGrid; }
        function cycleMaterial() { matIdx = (matIdx + 1) % materials.length; if(mainMesh) mainMesh.material = materials[matIdx]; }
        function toggleCamera() { activeCam = (activeCam === cameraP) ? cameraO : cameraP; updateCamera(); }
        function resetCamera() { lon = 45; lat = 45; camRadius = 150; updateCamera(); }

        let lon = 45, lat = 45;
        function updateCamera() {
            const phi = (90 - lat) * (Math.PI / 180); const theta = lon * (Math.PI / 180);
            const pos = new THREE.Vector3(camRadius * Math.sin(phi) * Math.cos(theta), camRadius * Math.cos(phi), camRadius * Math.sin(phi) * Math.sin(theta));
            cameraP.position.copy(pos); cameraP.lookAt(0,0,0);
            cameraO.position.copy(pos); cameraO.lookAt(0,0,0);
            let z = camRadius / 100; cameraO.left = -d*aspect*z; cameraO.right = d*aspect*z; cameraO.top = d*z; cameraO.bottom = -d*z;
            cameraO.updateProjectionMatrix();
        }

        // Eventos táctiles
        let isMoving = false, px = 0, py = 0;
        canvas.addEventListener('touchstart', e => { isMoving = true; px = e.touches[0].clientX; py = e.touches[0].clientY; autoRotate = false; });
        canvas.addEventListener('touchmove', e => {
            if(!isMoving) return;
            lon -= (e.touches[0].clientX - px) * 0.6; lat += (e.touches[0].clientY - py) * 0.6;
            lat = Math.max(-85, Math.min(85, lat)); px = e.touches[0].clientX; py = e.touches[0].clientY;
            updateCamera();
        });
        canvas.addEventListener('touchend', () => isMoving = false);

        function build(code) {
            if(mainMesh) scene.remove(mainMesh);
            try {
                const func = new Function("CSG", code + "\nreturn main();");
                currentCSG = func(CSG);
                const geom = new THREE.BufferGeometry();
                const v = []; const n = [];
                currentCSG.toPolygons().forEach(p => {
                    for(let i=2; i<p.vertices.length; i++) {
                        v.push(p.vertices[0].pos.x, p.vertices[0].pos.y, p.vertices[0].pos.z);
                        v.push(p.vertices[i-1].pos.x, p.vertices[i-1].pos.y, p.vertices[i-1].pos.z);
                        v.push(p.vertices[i].pos.x, p.vertices[i].pos.y, p.vertices[i].pos.z);
                        const norm = p.plane.normal;
                        n.push(norm.x, norm.y, norm.z, norm.x, norm.y, norm.z, norm.x, norm.y, norm.z);
                    }
                });
                geom.setAttribute('position', new THREE.Float32BufferAttribute(v, 3));
                geom.setAttribute('normal', new THREE.Float32BufferAttribute(n, 3));
                mainMesh = new THREE.Mesh(geom, materials[matIdx]);
                scene.add(mainMesh);
                
                geom.computeBoundingBox();
                const b = geom.boundingBox;
                document.getElementById('bbox-info').innerText = `📐 ${Math.abs(b.max.x-b.min.x).toFixed(1)}x${Math.abs(b.max.y-b.min.y).toFixed(1)}x${Math.abs(b.max.z-b.min.z).toFixed(1)}mm`;
                document.getElementById('poly-count').innerText = v.length/9;
            } catch(e) { console.error(e); }
        }

        function exportSTL() {
            if(!currentCSG) return;
            let s = "solid nexus_v26\n";
            currentCSG.toPolygons().forEach(p => {
                const norm = p.plane.normal;
                for(let i=2; i<p.vertices.length; i++) {
                    s += `facet normal ${norm.x} ${norm.y} ${norm.z}\nouter loop\n`;
                    [0, i-1, i].forEach(idx => {
                        const vert = p.vertices[idx].pos;
                        s += `vertex ${vert.x} ${vert.y} ${vert.z}\n`;
                    });
                    s += `endloop\nendfacet\n`;
                }
            });
            s += "endsolid nexus_v26\n";
            const b = new Blob([s], {type: 'text/plain'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'nexus_out.stl'; a.click();
        }

        function animate() {
            if(autoRotate) { lon += 0.4; updateCamera(); }
            renderer.render(scene, activeCam);
            requestAnimationFrame(animate);
        }

        function decode(s) { return decodeURIComponent(atob(s).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join('')); }
        fetch('/api/get_code_b64.json').then(r => r.json()).then(d => {
            if(d.code_b64) { build(decode(d.code_b64)); updateCamera(); animate(); }
        });
        renderer.setSize(window.innerWidth, window.innerHeight*0.8);
    </script>
</body>
</html>
